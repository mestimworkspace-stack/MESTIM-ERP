<!DOCTYPE html>
<html lang="bg">
<head>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MESTIM TEAM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
        h1, h2 { font-family: 'Montserrat', sans-serif; }
        .mobile-card { background: white; border-radius: 24px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-left: 8px solid #2563eb; }
    </style>
</head>
<body class="p-4 pb-12">

    <!-- LOGIN SCREEN (Ако не е влязъл през централния вход) -->
    <div id="login-screen" class="min-h-screen fixed inset-0 z-50 flex items-center justify-center bg-slate-900 p-6">
        <form onsubmit="handleLogin(event)" class="bg-white p-10 rounded-[40px] w-full max-w-sm shadow-2xl space-y-4">
            <h1 class="text-3xl font-black text-slate-900 mb-2 italic">MESTIM <span class="text-blue-600 font-normal">TEAM</span></h1>
            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-6">Вход за екипа</p>
            <input type="email" id="email" placeholder="Имейл" required autocomplete="username" class="w-full p-5 bg-slate-50 rounded-2xl outline-none border-2 border-transparent focus:border-blue-500 font-bold">
            <input type="password" id="pass" placeholder="Парола" required autocomplete="current-password" class="w-full p-5 bg-slate-50 rounded-2xl outline-none border-2 border-transparent focus:border-blue-500 font-bold">
            <button type="submit" class="w-full bg-blue-600 text-white p-5 rounded-2xl font-bold shadow-xl">ВХОД</button>
        </form>
    </div>

    <!-- APP SCREEN -->
    <div id="app-screen" class="hidden space-y-6 pt-4">
        <header class="flex justify-between items-center">
            <div>
                <p id="date-now" class="text-[10px] font-bold text-blue-600 uppercase tracking-widest mb-1"></p>
                <h2 id="user-name" class="text-2xl font-black text-slate-900 italic uppercase leading-none">Зареждане...</h2>
            </div>
            <button onclick="logout()" class="p-3 bg-red-50 text-red-500 rounded-xl text-xs font-bold uppercase">Изход</button>
        </header>

        <div class="space-y-4">
            <h3 class="font-black text-slate-800 uppercase text-xs tracking-[0.2em] mb-4">Моите задачи за днес</h3>
            <div id="my-orders" class="space-y-4">
                <div class="p-10 text-center animate-pulse text-slate-400 italic font-bold">Синхронизиране...</div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwyk9p6Rocd7sK42etJeiFBzT4vHKA3pQPxKnUV4NSx-0h7LRPByLMyihWZOYOOYj_xUw/exec'; 
        let user = null;

        window.onload = () => {
            if (localStorage.getItem('mestim_auth') === 'true') {
                user = JSON.parse(localStorage.getItem('mestim_user'));
                showApp();
            }
        };

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const res = await fetch(`${API_URL}?action=LOGIN&email=${encodeURIComponent(email)}&pass=${encodeURIComponent(pass)}`);
            const result = await res.json();
            if (result.success) {
                localStorage.setItem('mestim_auth', 'true');
                localStorage.setItem('mestim_user', JSON.stringify(result.user));
                location.reload();
            } else { alert("Грешен имейл или парола!"); }
        }

        function showApp() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            document.getElementById('user-name').innerText = user.name;
            document.getElementById('date-now').innerText = new Date().toLocaleDateString('bg-BG', { weekday: 'long', day: 'numeric', month: 'long' });
            loadMyOrders();
        }

        function logout() { localStorage.clear(); location.reload(); }

        async function loadMyOrders() {
            try {
                const res = await fetch(`${API_URL}?action=GET_DATA&tab=Orders`);
                const result = await res.json();
                
                // ВАЖНО: Тук филтрираме поръчките, в които е назначен ТОЗИ служител
                const myOrders = (result.data || []).filter(o => 
                    o.Assignments && o.Assignments.toString().split(',').includes(user.id.toString())
                );

                const container = document.getElementById('my-orders');
                if(myOrders.length === 0) {
                    container.innerHTML = '<div class="p-16 text-center text-slate-400 italic text-sm border-2 border-dashed border-slate-200 rounded-[32px]">Нямате назначени задачи за днес.</div>';
                    return;
                }

                container.innerHTML = myOrders.map(o => `
                    <div class="mobile-card space-y-4">
                        <div class="flex justify-between items-start">
                            <span class="bg-blue-50 text-blue-600 px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest">${o.TimeStart} - ${o.TimeEnd}</span>
                            <span class="text-[10px] font-bold text-slate-300">#${o.ID_Order.slice(-4)}</span>
                        </div>
                        <div>
                            <h4 class="text-xl font-black text-slate-800 tracking-tight leading-none uppercase italic">${o.ClientName}</h4>
                            <p class="text-xs font-bold text-blue-500 mt-1 uppercase tracking-widest">${o.Service}</p>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-2xl text-xs text-slate-600 font-medium leading-relaxed">
                            📍 ${o.AddrStart || 'Няма адрес'}<br>
                            📝 ${o.Description || 'Няма допълнителни бележки'}
                        </div>
                        
                        <div class="grid grid-cols-2 gap-3">
                            <a href="tel:${o.Phone}" class="bg-slate-900 text-white p-4 rounded-2xl text-center font-bold text-[10px] tracking-widest flex items-center justify-center gap-2">📞 ОБАДИ СЕ</a>
                            <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(o.AddrStart)}" target="_blank" class="bg-slate-200 text-slate-700 p-4 rounded-2xl text-center font-bold text-[10px] tracking-widest flex items-center justify-center gap-2">📍 КАРТА</a>
                        </div>
                        
                        <button onclick="clockIn('${o.ID_Order}')" class="w-full bg-green-600 text-white p-5 rounded-2xl font-black text-xs uppercase tracking-[0.2em] shadow-xl shadow-green-900/20 mt-2 active:scale-95 transition-all">Започни работа</button>
                    </div>
                `).join('');
            } catch (err) { console.error(err); }
        }

        async function clockIn(orderId) {
    if(!confirm("Започвате работа?")) return;
    const logData = {
        ID_Log: "LOG-" + Date.now(),
        Order_ID: orderId,
        Emp_ID: user.id,
        Emp_Name: user.name,
        Clock_In: new Date().toISOString(), // Пълен формат за изчисления
        Status: 'Started'
    };
    await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'SAVE_DATA', tab: 'WorkLogs', data: logData }) });
    alert("Записано! Когато приключите, натиснете СТОП.");
    location.reload();
}

async function clockOut(orderId) {
    if(!confirm("Приключвате ли работа по тази поръчка?")) return;
    const res = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'CLOCK_OUT', empId: user.id, orderId: orderId })
    });
    const result = await res.json();
    if (result.success) {
        alert(`Работата приключи!\nВреме: ${result.minutes} мин.\nЗаработена сума: ${result.pay} EUR`);
        location.reload();
    }
        }
    </script>
</body>
</html>
