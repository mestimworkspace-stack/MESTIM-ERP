<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP OFFICE - Местим Всичко</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        h1, h2 { font-family: 'Montserrat', sans-serif; }
        .sidebar-btn.active { background: #1e293b; border-left: 4px solid #3b82f6; color: white; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(2px); }
        .modal.active { display: flex; }
    </style>
</head>
<body>

    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-slate-900 text-slate-400 p-6 shrink-0 shadow-xl">
            <h1 class="text-white text-xl font-bold mb-10">MESTIM <span class="text-blue-500 font-black">ERP</span></h1>
            <nav class="space-y-2">
                <button onclick="changeTab('Clients', this)" class="sidebar-btn active w-full text-left p-3 rounded-lg hover:bg-slate-800">👥 Клиенти</button>
                <button onclick="changeTab('Employees', this)" class="sidebar-btn w-full text-left p-3 rounded-lg hover:bg-slate-800">👷 Служители</button>
            </nav>
        </aside>

        <!-- Main -->
        <main class="flex-1 p-10">
            <header class="flex justify-between items-center mb-10">
                <h2 id="section-title" class="text-4xl font-extrabold text-slate-800">Клиенти</h2>
                <button onclick="openModal()" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-700 shadow-lg transition">
                    + ДОБАВИ НОВ
                </button>
            </header>

            <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr id="table-headers" class="bg-slate-50 border-b border-slate-100 text-xs font-bold text-slate-400 uppercase tracking-widest">
                                <th class="p-6">Зареждане на данни...</th>
                            </tr>
                        </thead>
                        <tbody id="table-body" class="divide-y divide-slate-50"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div id="entryModal" class="modal">
        <div class="bg-white rounded-3xl w-full max-w-md p-8 shadow-2xl">
            <h3 class="text-2xl font-bold mb-6 text-slate-800">Нов запис</h3>
            <form id="dataForm" onsubmit="handleSave(event)" class="space-y-4">
                <div id="form-fields" class="space-y-4"></div>
                <div class="flex gap-3 pt-4">
                    <button type="button" onclick="closeModal()" class="flex-1 p-3 bg-slate-100 rounded-xl font-bold">Отказ</button>
                    <button type="submit" id="saveBtn" class="flex-1 p-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700">Запази</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ВАЖНО: ТУК ПОСТАВИ НОВИЯ URL ЛИНК!
        const API_URL = 'https://script.google.com/macros/s/AKfycbwAKelVaD8tyPQFtIroMFbEwGlxJhaomGWsTKw_JlAjMyhjwQ2oqy5pBnhD_S38UiAL6Q/exec'; 

        let currentTab = 'Clients';

        window.onload = loadData;

        async function loadData() {
            const thead = document.getElementById('table-headers');
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '<tr><td class="p-10 text-center animate-pulse text-slate-400">Синхронизиране...</td></tr>';

            try {
                // ИЗПОЛЗВАМЕ GET ЗА ЗАРЕЖДАНЕ (Bypasses CORS)
                const response = await fetch(`${API_URL}?action=GET_DATA&tab=${currentTab}`);
                const result = await response.json();

                if (result.success && result.data.length > 0) {
                    const keys = Object.keys(result.data[0]);
                    thead.innerHTML = keys.map(k => `<th class="p-6">${k}</th>`).join('');
                    tbody.innerHTML = result.data.map(row => `
                        <tr class="hover:bg-blue-50/50 border-b border-slate-50">
                            ${keys.map(k => `<td class="p-6 text-sm text-slate-600">${row[k] || ''}</td>`).join('')}
                        </tr>
                    `).join('');
                } else {
                    thead.innerHTML = '<th class="p-6 text-slate-400">Няма данни</th>';
                    tbody.innerHTML = '';
                }
            } catch (err) {
                console.error(err);
                tbody.innerHTML = '<tr><td class="p-10 text-red-500 text-center">Грешка при връзка. Провери URL!</td></tr>';
            }
        }

        async function changeTab(tab, btn) {
            currentTab = tab;
            document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('section-title').innerText = (tab === 'Clients' ? 'Клиенти' : 'Служители');
            loadData();
        }

        function openModal() {
            const container = document.getElementById('form-fields');
            if (currentTab === 'Clients') {
                container.innerHTML = `
                    <input type="text" name="Name" placeholder="Име на клиент" required class="w-full p-4 bg-slate-50 rounded-xl outline-none border border-transparent focus:border-blue-500">
                    <input type="text" name="Phone" placeholder="Телефон" required class="w-full p-4 bg-slate-50 rounded-xl outline-none border border-transparent focus:border-blue-500">
                `;
            } else {
                container.innerHTML = `
                    <input type="text" name="Name" placeholder="Име на служител" required class="w-full p-4 bg-slate-50 rounded-xl outline-none border border-transparent focus:border-blue-500">
                    <input type="email" name="Email" placeholder="Имейл" required class="w-full p-4 bg-slate-50 rounded-xl outline-none border border-transparent focus:border-blue-500">
                    <input type="password" name="Password" placeholder="Парола" required class="w-full p-4 bg-slate-50 rounded-xl outline-none border border-transparent focus:border-blue-500">
                    <select name="Role" class="w-full p-4 bg-slate-50 rounded-xl outline-none border border-transparent focus:border-blue-500">
                        <option value="Employee">Employee</option>
                        <option value="Manager">Manager</option>
                        <option value="Admin">Admin</option>
                    </select>
                `;
            }
            document.getElementById('entryModal').classList.add('active');
        }

        function closeModal() { document.getElementById('entryModal').classList.remove('active'); }

        async function handleSave(e) {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            btn.innerText = 'Записване...';

            const data = Object.fromEntries(new FormData(e.target).entries());
            data[currentTab === 'Clients' ? 'ID_Client' : 'ID_Emp'] = Date.now();

            try {
                // ЗАПИСЪТ СТАВА С POST (Безопасен формат)
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'SAVE_DATA', tab: currentTab, data: data })
                });
                closeModal();
                loadData();
            } catch (err) {
                alert('Грешка при запис!');
            } finally {
                btn.disabled = false;
                btn.innerText = 'Запази';
            }
        }
    </script>
</body>
</html>
