<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MESTIM ERP - OFFICE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
        h1, h2, h3 { font-family: 'Montserrat', sans-serif; }
        .sidebar-btn.active { background: #2563eb; color: white; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(8px); }
        .modal.active { display: flex; }
        #loading-overlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.7); z-index: 2000; align-items: center; justify-content: center; font-weight: bold; }
    </style>
</head>
<body>

    <div id="loading-overlay" class="flex flex-col gap-4">
        <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
        <p class="text-blue-600 animate-pulse tracking-widest text-xs uppercase">Синхронизиране...</p>
    </div>

    <!-- LOGIN -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center p-6 bg-slate-900">
        <form onsubmit="handleLogin(event)" class="bg-white p-12 rounded-[40px] w-full max-w-md shadow-2xl space-y-4">
            <h1 class="text-3xl font-black text-slate-900 mb-6 italic italic tracking-tighter">MESTIM <span class="text-blue-600 font-normal">ERP</span></h1>
            <input type="email" id="email" placeholder="Имейл" required class="w-full p-5 bg-slate-50 rounded-2xl outline-none border-2 border-transparent focus:border-blue-500">
            <input type="password" id="pass" placeholder="Парола" required class="w-full p-5 bg-slate-50 rounded-2xl outline-none border-2 border-transparent focus:border-blue-500">
            <button type="submit" class="w-full bg-blue-600 text-white p-5 rounded-2xl font-bold hover:bg-slate-800 transition-all">ВХОД (ENTER)</button>
        </form>
    </div>

    <!-- APP -->
    <div id="app-screen" class="hidden min-h-screen flex">
        <aside class="w-72 bg-slate-900 text-slate-400 p-8 shrink-0 flex flex-col shadow-2xl">
            <h1 class="text-white text-xl font-black mb-12 italic tracking-tighter">MESTIM <span class="text-blue-600">OFFICE</span></h1>
            <nav class="space-y-3 flex-1">
                <button onclick="changeTab('Clients', this)" class="sidebar-btn active w-full text-left p-4 rounded-2xl flex items-center gap-3 font-bold">👥 Клиенти</button>
                <button onclick="changeTab('Employees', this)" class="sidebar-btn w-full text-left p-4 rounded-2xl flex items-center gap-3 font-bold">👷 Екип</button>
                <button onclick="changeTab('Resources', this)" class="sidebar-btn w-full text-left p-4 rounded-2xl flex items-center gap-3 font-bold">📚 Ресурси</button>
                <button onclick="changeTab('Orders', this)" class="sidebar-btn w-full text-left p-4 rounded-2xl flex items-center gap-3 font-bold">📦 Поръчки</button>
            </nav>
            <button onclick="logout()" class="text-xs font-bold text-red-400 hover:text-white uppercase tracking-widest pt-6 border-t border-slate-800">Изход</button>
        </aside>

        <main class="flex-1 p-12 overflow-y-auto">
            <header class="flex justify-between items-center mb-12">
                <h2 id="section-title" class="text-5xl font-extrabold text-slate-900 tracking-tighter italic">Клиенти</h2>
                <button onclick="openModal()" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold hover:bg-blue-700 shadow-xl transition-all">+ ДОБАВИ НОВ</button>
            </header>

            <div class="bg-white rounded-[40px] shadow-sm border border-slate-100 overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead id="table-head" class="bg-slate-50 border-b border-slate-100 text-[10px] font-black text-slate-400 uppercase tracking-widest"></thead>
                    <tbody id="table-body" class="divide-y divide-slate-50"></tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- MODAL -->
    <div id="entryModal" class="modal">
        <div class="bg-white rounded-[40px] w-full max-w-lg p-10 shadow-2xl">
            <h3 id="modal-title" class="text-2xl font-bold mb-8 text-slate-900">Запис</h3>
            <form id="dataForm" onsubmit="handleSave(event)" class="space-y-4 max-h-[60vh] overflow-y-auto px-2">
                <div id="form-fields" class="space-y-4"></div>
                <div class="flex gap-4 pt-8">
                    <button type="button" onclick="closeModal()" class="flex-1 p-4 bg-slate-100 rounded-2xl font-bold">Отказ</button>
                    <button type="submit" id="saveBtn" class="flex-1 p-4 bg-blue-600 text-white rounded-2xl font-bold uppercase">Запази</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwJn-5IGOQB4fiqyCviUVjOE_NfZwLqzbk5wP2d4YhFkmiqCGypzuqinfzGRl38jbhwGw/exec';
        let currentTab = 'Clients';
        let fullData = [];

        async function handleLogin(e) {
            e.preventDefault();
            toggleLoader(true);
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'LOGIN', email: document.getElementById('email').value, password: document.getElementById('pass').value })
                });
                const result = await res.json();
                if (result.success) {
                    sessionStorage.setItem('isAuth', 'true'); // Използваме sessionStorage - изчезва при затваряне
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('app-screen').classList.remove('hidden');
                    loadData();
                } else { alert("Грешен имейл или парола!"); }
            } finally { toggleLoader(false); }
        }

        function logout() { sessionStorage.clear(); location.reload(); }

        async function loadData() {
            toggleLoader(true);
            const tbody = document.getElementById('table-body');
            const thead = document.getElementById('table-head');
            try {
                const res = await fetch(`${API_URL}?action=GET_DATA&tab=${currentTab}`);
                const result = await res.json();
                fullData = result.data;
                if (result.success && fullData.length > 0) {
                    const keys = Object.keys(fullData[0]);
                    thead.innerHTML = `<tr>${keys.map(k => `<th class="p-6">${k}</th>`).join('')}<th class="p-6"></th></tr>`;
                    tbody.innerHTML = fullData.map((row, idx) => `
                        <tr class="hover:bg-slate-50 transition-colors border-b border-slate-50">
                            ${keys.map(k => `<td class="p-6 text-sm text-slate-600 font-medium">${row[k] || ''}</td>`).join('')}
                            <td class="p-6 text-right space-x-3">
                                <button onclick="openModal(${idx})" class="text-blue-500 hover:scale-125 transition">✎</button>
                                <button onclick="deleteRow('${row[keys[0]]}')" class="text-red-400 hover:scale-125 transition">✕</button>
                            </td>
                        </tr>`).join('');
                } else { tbody.innerHTML = '<tr><td class="p-20 text-center italic text-slate-300">Няма данни.</td></tr>'; }
            } finally { toggleLoader(false); }
        }

        async function handleSave(e) {
            e.preventDefault();
            toggleLoader(true);
            const data = Object.fromEntries(new FormData(e.target).entries());
            const idKey = Object.keys(fullData[0] || {[`ID_${currentTab.slice(0,-1)}`]:''})[0];
            if (!data[idKey]) data[idKey] = "ID-" + Math.floor(Math.random() * 900000);
            
            try {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'SAVE_DATA', tab: currentTab, data: data }) });
                setTimeout(() => { closeModal(); loadData(); }, 1500);
            } catch(e) { toggleLoader(false); }
        }

        async function deleteRow(id) {
            if (!confirm("Изтриване?")) return;
            toggleLoader(true);
            await fetch(`${API_URL}?action=DELETE_DATA&tab=${currentTab}&id=${id}`, { method: 'POST' });
            loadData();
        }

        function changeTab(tab, btn) {
            currentTab = tab;
            document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('section-title').innerText = btn.innerText.split(' ')[1];
            loadData();
        }

        function openModal(idx = null) {
            const editData = idx !== null ? fullData[idx] : null;
            const container = document.getElementById('form-fields');
            const fields = {
                'Clients': ['ID_Client', 'Name', 'Phone', 'Address_Main', 'Notes'],
                'Employees': ['ID_Emp', 'Name', 'Email', 'Password', 'Role'],
                'Resources': ['ID_Resource', 'Title', 'Link', 'Notes'],
                'Orders': ['ID_Order', 'ClientName', 'Service', 'Date', 'TimeStart', 'AddrStart']
            };
            container.innerHTML = fields[currentTab].map(f => {
                if (f.includes('ID')) return `<input type="hidden" name="${f}" value="${editData ? editData[f] : ''}">`;
                if (f === 'Role') return `<select name="Role" class="w-full p-4 bg-slate-50 rounded-2xl outline-none"><option value="Employee" ${editData?.Role=='Employee'?'selected':''}>Employee</option><option value="Admin" ${editData?.Role=='Admin'?'selected':''}>Admin</option></select>`;
                return `<input type="text" name="${f}" placeholder="${f}" value="${editData ? editData[f] : ''}" class="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500">`;
            }).join('');
            document.getElementById('modal-title').innerText = editData ? "Редактирай" : "Нов Запис";
            document.getElementById('entryModal').classList.add('active');
        }

        function closeModal() { document.getElementById('entryModal').classList.remove('active'); }
        function toggleLoader(show) { document.getElementById('loading-overlay').style.display = show ? 'flex' : 'none'; }
    </script>
</body>
</html>
