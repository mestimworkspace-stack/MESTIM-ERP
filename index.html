<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP OFFICE - Местим Всичко</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        h1, h2, h3 { font-family: 'Montserrat', sans-serif; }
        .sidebar-item { transition: all 0.2s; border-left: 4px solid transparent; }
        .sidebar-item.active { background: #1e293b; border-left: 4px solid #3b82f6; color: white; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal.active { display: flex; }
    </style>
</head>
<body>

    <div class="flex min-h-screen">
        <aside class="w-72 bg-slate-900 text-slate-400 p-8 shrink-0">
            <h1 class="text-white text-2xl font-black mb-12">MESTIM <span class="text-blue-500">ERP</span></h1>
            <nav class="space-y-3">
                <button onclick="changeTab('Clients', this)" class="sidebar-item active w-full text-left p-4 rounded-xl flex items-center gap-3 hover:text-white">👥 Клиенти</button>
                <button onclick="changeTab('Employees', this)" class="sidebar-item w-full text-left p-4 rounded-xl flex items-center gap-3 hover:text-white">👷 Служители</button>
            </nav>
        </aside>

        <main class="flex-1 p-12">
            <header class="flex justify-between items-end mb-12">
                <div>
                    <h2 id="section-title" class="text-5xl font-extrabold text-slate-900">Клиенти</h2>
                </div>
                <button onclick="openModal()" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold shadow-lg hover:bg-blue-700">
                    + ДОБАВИ НОВ
                </button>
            </header>

            <div class="bg-white rounded-[32px] shadow-sm border border-slate-100 overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr id="table-headers" class="bg-slate-50 border-b border-slate-100 font-bold uppercase text-xs text-slate-400">
                            <th class="p-6 text-center italic">Зареждане...</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-slate-50"></tbody>
                </table>
                <div id="no-data" class="hidden py-20 text-center text-slate-400 font-medium italic">Няма данни за показване.</div>
            </div>
        </main>
    </div>

    <!-- MODAL -->
    <div id="entryModal" class="modal">
        <div class="bg-white rounded-[32px] w-full max-w-md p-10 shadow-2xl">
            <h3 class="text-2xl font-bold mb-6">Нов запис</h3>
            <form id="dataForm" onsubmit="handleSave(event)" class="space-y-4">
                <div id="form-fields" class="space-y-4"></div>
                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="closeModal()" class="flex-1 p-4 bg-slate-100 rounded-2xl font-bold">Отказ</button>
                    <button type="submit" id="saveBtn" class="flex-1 p-4 bg-blue-600 text-white rounded-2xl font-bold">Запази</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ВАЖНО: ТУК СЛОЖИ НОВИЯ URL ОТ DEPLOY!
        const API_URL = 'https://script.google.com/macros/s/AKfycbwAKelVaD8tyPQFtIroMFbEwGlxJhaomGWsTKw_JlAjMyhjwQ2oqy5pBnhD_S38UiAL6Q/exec'; 

        let currentTab = 'Clients';

        window.onload = loadData;

        async function changeTab(tab, el) {
            currentTab = tab;
            document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('section-title').innerText = tab === 'Clients' ? 'Клиенти' : 'Служители';
            loadData();
        }

        async function loadData() {
            const tbody = document.getElementById('table-body');
            const thead = document.getElementById('table-headers');
            const noData = document.getElementById('no-data');
            
            tbody.innerHTML = '<tr><td colspan="10" class="p-20 text-center animate-pulse text-slate-400 italic">Синхронизиране...</td></tr>';
            noData.classList.add('hidden');

            try {
                // ИЗПОЛЗВАМЕ ЧИСТ FETCH БЕЗ JSON HEADERS ЗА CORS BYPASS
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'GET_DATA', tab: currentTab })
                });
                
                const result = await response.json();

                if (result.success && result.data && result.data.length > 0) {
                    const keys = Object.keys(result.data[0]);
                    thead.innerHTML = keys.map(k => `<th class="p-6">${k}</th>`).join('');
                    tbody.innerHTML = result.data.map(row => `
                        <tr class="hover:bg-blue-50/50 border-b border-slate-50">
                            ${keys.map(k => `<td class="p-6 text-sm">${row[k] || ''}</td>`).join('')}
                        </tr>
                    `).join('');
                } else {
                    thead.innerHTML = '';
                    tbody.innerHTML = '';
                    noData.classList.remove('hidden');
                }
            } catch (e) {
                tbody.innerHTML = '<tr><td class="p-20 text-red-500 text-center font-bold">ГРЕШКА ВЪВ ВРЪЗКАТА!</td></tr>';
            }
        }

        function openModal() {
            const container = document.getElementById('form-fields');
            if (currentTab === 'Clients') {
                container.innerHTML = `
                    <input type="text" name="Name" placeholder="Име на клиент" required class="w-full p-4 bg-slate-50 rounded-2xl outline-none">
                    <input type="text" name="Phone" placeholder="Телефон" required class="w-full p-4 bg-slate-50 rounded-2xl outline-none">
                `;
            } else {
                container.innerHTML = `
                    <input type="text" name="Name" placeholder="Име на служител" required class="w-full p-4 bg-slate-50 rounded-2xl outline-none">
                    <input type="email" name="Email" placeholder="Имейл" required class="w-full p-4 bg-slate-50 rounded-2xl outline-none">
                    <input type="text" name="Password" placeholder="Парола" required class="w-full p-4 bg-slate-50 rounded-2xl outline-none">
                `;
            }
            document.getElementById('entryModal').classList.add('active');
        }

        function closeModal() { document.getElementById('entryModal').classList.remove('active'); }

        async function handleSave(e) {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            btn.innerText = 'Запис...';

            const data = Object.fromEntries(new FormData(e.target).entries());
            data[currentTab === 'Clients' ? 'ID_Client' : 'ID_Emp'] = Date.now();

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'SAVE_DATA', tab: currentTab, data: data })
                });
                closeModal();
                loadData();
            } catch (err) {
                alert('Грешка при запис');
            } finally {
                btn.disabled = false;
                btn.innerText = 'Запази';
            }
        }
    </script>
</body>
</html>
