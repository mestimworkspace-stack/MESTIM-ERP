<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>MESTIM OFFICE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-['Inter']">
    <div id="login-screen" class="min-h-screen fixed inset-0 z-[2000] flex items-center justify-center bg-slate-900 p-6">
        <form onsubmit="handleLogin(event)" class="bg-white p-10 rounded-[40px] w-full max-w-sm shadow-2xl space-y-4 text-center">
            <h1 class="text-3xl font-black italic uppercase">Mestim <span class="text-blue-600">ERP</span></h1>
            <input type="email" id="l-email" placeholder="Имейл" required class="w-full p-4 bg-slate-100 rounded-2xl outline-none">
            <input type="password" id="l-pass" placeholder="Парола" required class="w-full p-4 bg-slate-100 rounded-2xl outline-none">
            <button type="submit" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold uppercase">Влез</button>
        </form>
    </div>

    <div id="app-screen" class="hidden min-h-screen flex">
        <aside class="w-72 bg-slate-900 text-white p-8 flex flex-col">
            <h1 class="text-xl font-black mb-10 italic uppercase">Mestim <span class="text-blue-500 block text-[10px]">Office</span></h1>
            <nav class="space-y-2 flex-1">
                <button onclick="changeTab('Clients', this)" id="btn-clients" class="w-full text-left p-4 rounded-2xl font-bold bg-blue-600">👥 Клиенти</button>
                <button onclick="changeTab('Employees', this)" class="w-full text-left p-4 rounded-2xl font-bold hover:bg-slate-800">👷 Екип</button>
            </nav>
            <button onclick="location.href='operations.html'" class="w-full p-4 bg-orange-600 rounded-2xl font-bold mb-4">🚀 ГРАФИК</button>
            <button onclick="localStorage.clear(); location.reload()" class="text-red-400 font-bold uppercase text-xs">Изход</button>
        </aside>

        <main class="flex-1 p-12 overflow-y-auto">
            <header class="flex justify-between items-center mb-8">
                <h2 id="section-title" class="text-4xl font-extrabold italic">Клиенти</h2>
                <div class="flex gap-4">
                    <input type="text" oninput="filterData(this.value)" placeholder="Търси..." class="p-4 rounded-2xl border-none shadow-sm w-64 outline-none">
                    <button onclick="openModal()" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold shadow-lg">+ ДОБАВИ</button>
                </div>
            </header>
            <div class="bg-white rounded-[40px] shadow-sm overflow-hidden border">
                <table class="w-full text-left border-collapse">
                    <thead id="t-head" class="bg-slate-50 text-[10px] font-black uppercase tracking-widest border-b"></thead>
                    <tbody id="t-body" class="divide-y divide-slate-50"></tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- MODAL -->
    <div id="m-modal" class="hidden fixed inset-0 bg-black/80 z-[1000] flex items-center justify-center">
        <div class="bg-white p-10 rounded-[40px] w-full max-w-lg shadow-2xl">
            <form onsubmit="handleSave(event)" class="space-y-4">
                <div id="m-fields" class="space-y-4"></div>
                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="closeModal()" class="flex-1 p-4 bg-slate-100 rounded-2xl font-bold text-slate-400">Отказ</button>
                    <button type="submit" class="flex-1 p-4 bg-blue-600 text-white rounded-2xl font-bold">ЗАПАЗИ</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbyQelM5bDNtGj1NBIBhgoBzeKr0FTPaXLp52II59H_c8eBWJ6HBCTAgk2sOAqgeCBsdUg/exec';
        let currentTab = 'Clients', fullData = [];

        window.onload = () => { if(localStorage.getItem('mestim_auth')) showApp(); };
        async function handleLogin(e) {
            e.preventDefault();
            const res = await fetch(`${API_URL}?action=LOGIN&email=${encodeURIComponent(document.getElementById('l-email').value)}&pass=${encodeURIComponent(document.getElementById('l-pass').value)}`).then(r=>r.json());
            if(res.success){ localStorage.setItem('mestim_auth','true'); localStorage.setItem('mestim_user', JSON.stringify(res.user)); showApp(); }
            else alert("Грешен вход!");
        }
        function showApp(){ document.getElementById('login-screen').classList.add('hidden'); document.getElementById('app-screen').classList.remove('hidden'); loadData(); }
        async function loadData() {
            const res = await fetch(`${API_URL}?action=GET_DATA&tab=${currentTab}`).then(r=>r.json());
            fullData = res.data || [];
            renderTable(fullData);
        }
        function renderTable(data){
            if(!data.length) return;
            const keys = Object.keys(data[0]);
            document.getElementById('t-head').innerHTML = `<tr>${keys.map(k=>`<th class="p-6">${k}</th>`).join('')}<th class="p-6"></th></tr>`;
            document.getElementById('t-body').innerHTML = data.map((row,i)=>`
                <tr class="hover:bg-blue-50 transition-colors">
                    ${keys.map(k=>`<td class="p-6 text-sm">${row[k]||''}</td>`).join('')}
                    <td class="p-6 space-x-2"><button onclick="openModal(${i})">✎</button><button onclick="deleteRow('${row[keys[0]]}')">✕</button></td>
                </tr>`).join('');
        }
        function filterData(val){ const f = fullData.filter(r => JSON.stringify(r).toLowerCase().includes(val.toLowerCase())); renderTable(f); }
        async function handleSave(e){
            e.preventDefault();
            const d = Object.fromEntries(new FormData(e.target).entries());
            const idKey = currentTab==='Clients'?'ID_Client':'ID_Emp';
            if(!d[idKey]) d[idKey] = "ID-"+Date.now();
            await fetch(API_URL, {method:'POST', body: JSON.stringify({action:'SAVE_DATA', tab:currentTab, data:d})});
            closeModal(); setTimeout(loadData, 1000);
        }
        async function deleteRow(id){ if(confirm("Изтриване?")){ await fetch(`${API_URL}?action=DELETE_DATA&tab=${currentTab}&id=${id}`, {method:'POST'}); loadData(); } }
        function changeTab(t,b){ currentTab=t; document.querySelectorAll('nav button').forEach(x=>x.classList.remove('bg-blue-600')); b.classList.add('bg-blue-600'); document.getElementById('section-title').innerText=t==='Clients'?'Клиенти':'Екип'; loadData(); }
        function openModal(idx=null){
            const d = idx!==null?fullData[idx]:null;
            const config = {'Clients':['ID_Client','Name','Phone','Address_Main','Notes'], 'Employees':['ID_Emp','Name','Email','Phone','Rate_First_2h_Eur','Rate_Per_Min_Eur','Password','Role']};
            document.getElementById('m-fields').innerHTML = config[currentTab].map(f=>f.includes('ID')?`<input type="hidden" name="${f}" value="${d?d[f]:''}">`:`<input type="text" name="${f}" placeholder="${f}" value="${d?d[f]:''}" class="w-full p-4 bg-slate-100 rounded-2xl outline-none">`).join('');
            document.getElementById('m-modal').classList.remove('hidden');
        }
        function closeModal(){ document.getElementById('m-modal').classList.add('hidden'); }
    </script>
</body>
</html>
