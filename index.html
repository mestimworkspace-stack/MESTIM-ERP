<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP OFFICE - Местим Всичко</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
        h1, h2 { font-family: 'Montserrat', sans-serif; }
        .sidebar-btn.active { background: #2563eb; color: white; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(8px); }
        .modal.active { display: flex; }
        .table-container { background: white; border-radius: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="w-72 bg-slate-900 text-slate-400 p-8 shrink-0 flex flex-col">
            <h1 class="text-white text-2xl font-black mb-12 tracking-tighter italic">MESTIM <span class="text-blue-500 font-normal not-italic">ERP</span></h1>
            
            <nav class="space-y-3 flex-1">
                <button onclick="changeTab('Clients', this)" class="sidebar-btn active w-full text-left p-4 rounded-2xl transition-all flex items-center gap-3 font-semibold">👥 Клиенти</button>
                <button onclick="changeTab('Employees', this)" class="sidebar-btn w-full text-left p-4 rounded-2xl transition-all flex items-center gap-3 font-semibold">👷 Екип</button>
                <button onclick="changeTab('Resources', this)" class="sidebar-btn w-full text-left p-4 rounded-2xl transition-all flex items-center gap-3 font-semibold">📚 Ресурси</button>
            </nav>

            <div class="pt-6 border-t border-slate-800 text-xs uppercase tracking-widest font-bold text-slate-600">
                Office Version 1.2
            </div>
        </aside>

        <!-- Main -->
        <main class="flex-1 p-12">
            <header class="flex justify-between items-end mb-12">
                <div>
                    <p id="tab-indicator" class="text-blue-600 font-bold uppercase tracking-widest text-xs mb-2">Управление</p>
                    <h2 id="section-title" class="text-5xl font-extrabold text-slate-900 tracking-tight">Клиенти</h2>
                </div>
                <button onclick="openModal()" class="bg-slate-900 text-white px-8 py-4 rounded-2xl font-bold hover:bg-blue-600 transition-all shadow-xl shadow-slate-200">
                    + ДОБАВИ НОВ
                </button>
            </header>

            <div class="table-container overflow-hidden border border-slate-200">
                <table class="w-full text-left border-collapse">
                    <thead id="table-head" class="bg-slate-50 border-b border-slate-200 text-xs font-bold text-slate-500 uppercase tracking-widest">
                        <tr><th class="p-6">Зареждане на данни...</th></tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-slate-100">
                        <!-- Данни -->
                    </tbody>
                </table>
                <div id="no-data" class="hidden py-32 text-center">
                    <span class="text-5xl">Empty</span>
                    <p class="text-slate-400 mt-4 font-medium italic">Все още няма записи в този таб.</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Form -->
    <div id="entryModal" class="modal">
        <div class="bg-white rounded-[32px] w-full max-w-md p-10 shadow-2xl overflow-hidden">
            <div class="flex justify-between items-center mb-8">
                <h3 id="modal-title" class="text-3xl font-bold text-slate-900 tracking-tighter">Нов запис</h3>
                <button onclick="closeModal()" class="text-slate-300 hover:text-slate-900 transition">✕</button>
            </div>

            <form id="dataForm" onsubmit="handleSave(event)" class="space-y-5">
                <div id="form-fields" class="space-y-4 text-sm font-semibold text-slate-600">
                    <!-- Полета -->
                </div>
                <div class="flex gap-4 pt-6">
                    <button type="button" onclick="closeModal()" class="flex-1 p-4 bg-slate-100 rounded-2xl font-bold text-slate-500 hover:bg-slate-200 transition">Отказ</button>
                    <button type="submit" id="saveBtn" class="flex-1 p-4 bg-blue-600 text-white rounded-2xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-100 transition">Запази</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ПОСТАВИ ТВОЯ URL ТУК:
        const API_URL = 'https://script.google.com/macros/s/AKfycbzM7ZG2z84hI8N-ATyjtobInZDz43wnwG2Dv03YClBwEmmdUMrVoKHqMcEDl2Pj8CaXuw/exec'; 

        let currentTab = 'Clients';

        window.onload = loadData;

        async function loadData() {
            const tbody = document.getElementById('table-body');
            const thead = document.getElementById('table-head');
            const noData = document.getElementById('no-data');
            
            tbody.innerHTML = '<tr><td class="p-20 text-center animate-pulse text-slate-400 font-medium">Синхронизиране...</td></tr>';
            noData.classList.add('hidden');

            try {
                const response = await fetch(`${API_URL}?action=GET_DATA&tab=${currentTab}`);
                const result = await response.json();

                if (result.success && result.data && result.data.length > 0) {
                    const keys = Object.keys(result.data[0]);
                    thead.innerHTML = `<tr>${keys.map(k => `<th class="p-6">${k.replace(/_/g, ' ')}</th>`).join('')}</tr>`;
                    tbody.innerHTML = result.data.map(row => `
                        <tr class="hover:bg-slate-50 transition-colors border-b border-slate-50">
                            ${keys.map(k => `<td class="p-6 text-sm text-slate-700 font-medium">${row[k] || ''}</td>`).join('')}
                        </tr>
                    `).join('');
                } else {
                    thead.innerHTML = '';
                    tbody.innerHTML = '';
                    noData.classList.remove('hidden');
                }
            } catch (e) {
                tbody.innerHTML = '<tr><td class="p-20 text-red-500 text-center font-bold">Грешка при връзка. Провери URL!</td></tr>';
            }
        }

        async function changeTab(tab, btn) {
            currentTab = tab;
            document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            const titles = { 'Clients': 'Клиенти', 'Employees': 'Екип', 'Resources': 'Ресурси' };
            document.getElementById('section-title').innerText = titles[tab];
            loadData();
        }

        function openModal() {
            const container = document.getElementById('form-fields');
            let fields = '';

            if (currentTab === 'Clients') {
                fields = `
                    <label>ИМЕ НА КЛИЕНТ</label><input type="text" name="Name" required class="w-full p-4 bg-slate-50 rounded-xl outline-none border-2 border-transparent focus:border-blue-500">
                    <label>ТЕЛЕФОН</label><input type="text" name="Phone" required class="w-full p-4 bg-slate-50 rounded-xl outline-none border-2 border-transparent focus:border-blue-500">
                    <label>БЕЛЕЖКИ</label><input type="text" name="Notes" class="w-full p-4 bg-slate-50 rounded-xl outline-none border-2 border-transparent focus:border-blue-500">
                `;
            } else if (currentTab === 'Employees') {
                fields = `
                    <label>ИМЕ</label><input type="text" name="Name" required class="w-full p-4 bg-slate-50 rounded-xl outline-none border-2 border-transparent focus:border-blue-500">
                    <label>ИМЕЙЛ</label><input type="email" name="Email" required class="w-full p-4 bg-slate-50 rounded-xl outline-none border-2 border-transparent focus:border-blue-500">
                    <label>ПАРОЛА</label><input type="text" name="Password" required class="w-full p-4 bg-slate-50 rounded-xl outline-none border-2 border-transparent focus:border-blue-500">
                    <label>РОЛЯ</label>
                    <select name="Role" class="w-full p-4 bg-slate-50 rounded-xl outline-none border-2 border-transparent focus:border-blue-500">
                        <option value="Employee">Employee</option>
                        <option value="Manager">Manager</option>
                        <option value="Admin">Admin</option>
                    </select>
                `;
            } else if (currentTab === 'Resources') {
                fields = `
                    <label>ЗАГЛАВИЕ</label><input type="text" name="Title" required class="w-full p-4 bg-slate-50 rounded-xl outline-none border-2 border-transparent focus:border-blue-500">
                    <label>ЛИНК (Google Drive/Doc)</label><input type="text" name="Link" required class="w-full p-4 bg-slate-50 rounded-xl outline-none border-2 border-transparent focus:border-blue-500">
                    <label>БЕЛЕЖКИ</label><input type="text" name="Notes" class="w-full p-4 bg-slate-50 rounded-xl outline-none border-2 border-transparent focus:border-blue-500">
                `;
            }
            container.innerHTML = fields;
            document.getElementById('modal-title').innerText = "Добави " + currentTab;
            document.getElementById('entryModal').classList.add('active');
        }

        function closeModal() { document.getElementById('entryModal').classList.remove('active'); }

        async function handleSave(e) {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            btn.innerText = 'Записване...';

            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            
            // Генериране на ID според таба
            const idMap = { 'Clients': 'ID_Client', 'Employees': 'ID_Emp', 'Resources': 'ID_Resource' };
            data[idMap[currentTab]] = 'ID-' + Math.floor(Math.random() * 9000);

            try {
                // Използваме fetch без хедъри за максимална съвместимост
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors', 
                    body: JSON.stringify({ action: 'SAVE_DATA', tab: currentTab, data: data })
                });
                
                setTimeout(() => {
                    closeModal();
                    loadData();
                    btn.disabled = false;
                    btn.innerText = 'Запази';
                }, 1000);
            } catch (err) {
                alert('Грешка при запис!');
                btn.disabled = false;
                btn.innerText = 'Запази';
            }
        }
    </script>
</body>
</html>
