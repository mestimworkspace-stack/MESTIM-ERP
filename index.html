<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>MESTIM ERP - OFFICE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 1000; }
        .modal.active { display: flex; }
    </style>
</head>
<body>
    <div id="app-screen" class="flex min-h-screen">
        <aside class="w-64 bg-slate-900 text-white p-6 shrink-0 shadow-2xl">
            <h1 class="text-xl font-black mb-10 italic">MESTIM <span class="text-blue-500">OFFICE</span></h1>
            <nav class="space-y-2">
                <button onclick="changeTab('Clients', this)" class="w-full text-left p-4 rounded-xl font-bold bg-blue-600">👥 Клиенти</button>
                <button onclick="changeTab('Employees', this)" class="w-full text-left p-4 rounded-xl font-bold hover:bg-slate-800">👷 Екип</button>
                <button onclick="changeTab('Resources', this)" class="w-full text-left p-4 rounded-xl font-bold hover:bg-slate-800">📚 Ресурси</button>
            </nav>
            <div class="mt-10 pt-10 border-t border-slate-800">
                <button onclick="location.href='operations.html'" class="w-full p-4 rounded-xl bg-orange-600 font-bold text-xs uppercase">🚀 График (Ops)</button>
            </div>
        </aside>

        <main class="flex-1 p-10 overflow-y-auto">
            <header class="flex justify-between items-center mb-8">
                <h2 id="section-title" class="text-4xl font-extrabold text-slate-900 tracking-tighter italic">Клиенти</h2>
                <div class="flex gap-4">
                    <input type="text" id="search-input" oninput="filterTable()" placeholder="Търси име или телефон..." class="p-4 rounded-2xl border-none shadow-sm w-64 outline-none focus:ring-2 focus:ring-blue-500">
                    <button onclick="openModal()" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold shadow-lg">+ ДОБАВИ</button>
                </div>
            </header>

            <div class="bg-white rounded-[32px] shadow-sm border border-slate-100 overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead id="table-head" class="bg-slate-50 border-b border-slate-100 text-[10px] font-black text-slate-400 uppercase tracking-widest"></thead>
                    <tbody id="table-body" class="divide-y divide-slate-50"></tbody>
                </table>
            </div>

            <!-- ИСТОРИЯ НА ПОРЪЧКИТЕ -->
            <div id="history-section" class="mt-10 hidden">
                <h3 class="text-xl font-black text-slate-800 mb-4 italic">История на поръчките за: <span id="client-name-history" class="text-blue-600"></span></h3>
                <div id="history-container" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </main>
    </div>

    <!-- MODAL -->
    <div id="entryModal" class="modal"><div class="bg-white rounded-[40px] w-full max-w-lg p-10 shadow-2xl">
        <h3 id="modal-title" class="text-2xl font-bold mb-8">Запис</h3>
        <form id="dataForm" onsubmit="handleSave(event)" class="space-y-4">
            <div id="form-fields" class="space-y-4"></div>
            <div class="flex gap-4 pt-6"><button type="button" onclick="closeModal()" class="flex-1 p-4 bg-slate-100 rounded-2xl font-bold">Отказ</button><button type="submit" class="flex-1 p-4 bg-blue-600 text-white rounded-2xl font-bold">ЗАПАЗИ</button></div>
        </form>
    </div></div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbyTU8W-EU1K_zxiSMHBYYf8K7OlRfNk7FGt_Tnj0fD5Sge3wthy_v-XRCkaAlPkc45WTw/exec';
        let currentTab = 'Clients';
        let fullData = [];
        let allOrders = [];

        window.onload = () => { loadData(); loadOrders(); };

        async function loadData() {
            const res = await fetch(`${API_URL}?action=GET_DATA&tab=${currentTab}`);
            const result = await res.json();
            fullData = result.data || [];
            renderTable(fullData);
        }

        async function loadOrders() {
            const res = await fetch(`${API_URL}?action=GET_DATA&tab=Orders`);
            const result = await res.json();
            allOrders = result.data || [];
        }

        function renderTable(data) {
            const tbody = document.getElementById('table-body');
            const thead = document.getElementById('table-head');
            if(data.length > 0) {
                const keys = Object.keys(data[0]);
                thead.innerHTML = `<tr>${keys.map(k => `<th class="p-6">${k}</th>`).join('')}<th class="p-6"></th></tr>`;
                tbody.innerHTML = data.map((row, idx) => `
                    <tr onclick="showHistory('${row.Name}')" class="hover:bg-blue-50 cursor-pointer transition-colors border-b border-slate-50">
                        ${keys.map(k => `<td class="p-6 text-sm text-slate-600 font-medium">${row[k] || ''}</td>`).join('')}
                        <td class="p-6 text-right space-x-2">
                            <button onclick="event.stopPropagation(); openModal(${idx})" class="text-blue-500">✎</button>
                            <button onclick="event.stopPropagation(); deleteRow('${row[keys[0]]}')" class="text-red-400">✕</button>
                        </td>
                    </tr>`).join('');
            }
        }

        function filterTable() {
            const val = document.getElementById('search-input').value.toLowerCase();
            const filtered = fullData.filter(r => 
                (r.Name && r.Name.toLowerCase().includes(val)) || 
                (r.Phone && r.Phone.toString().includes(val))
            );
            renderTable(filtered);
        }

        function showHistory(clientName) {
            document.getElementById('history-section').classList.remove('hidden');
            document.getElementById('client-name-history').innerText = clientName;
            const history = allOrders.filter(o => o.ClientName === clientName);
            const container = document.getElementById('history-container');
            if(history.length === 0) container.innerHTML = '<p class="text-slate-400 italic">Няма намерени поръчки.</p>';
            else container.innerHTML = history.map(o => `
                <div class="bg-white p-6 rounded-2xl border border-blue-100 shadow-sm">
                    <p class="text-[10px] font-bold text-blue-500 uppercase">${o.Date.split('T')[0]} | ${o.TimeStart}</p>
                    <p class="font-bold text-slate-800">${o.Service}</p>
                    <p class="text-xs text-slate-500 mt-2 italic">${o.AddrStart || 'Няма адрес'}</p>
                </div>
            `).join('');
        }

        async function handleSave(e) {
            e.preventDefault();
            const data = Object.fromEntries(new FormData(e.target).entries());
            const idKey = currentTab === 'Clients' ? 'ID_Client' : (currentTab === 'Employees' ? 'ID_Emp' : 'ID_Resource');
            if (!data[idKey]) data[idKey] = "ID-" + Date.now();
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'SAVE_DATA', tab: currentTab, data: data }) });
            setTimeout(() => { closeModal(); loadData(); }, 1000);
        }

        async function deleteRow(id) {
            if(!confirm("Изтриване?")) return;
            await fetch(`${API_URL}?action=DELETE_DATA&tab=${currentTab}&id=${id}`, { method: 'POST' });
            loadData();
        }

        function changeTab(tab, btn) {
            currentTab = tab;
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('bg-blue-600'));
            btn.classList.add('bg-blue-600');
            document.getElementById('section-title').innerText = tab;
            document.getElementById('history-section').classList.add('hidden');
            loadData();
        }

        function openModal(idx = null) {
            const editData = idx !== null ? fullData[idx] : null;
            const container = document.getElementById('form-fields');
            const config = {
                'Clients': ['ID_Client', 'Name', 'Phone', 'Address_Main', 'Notes'],
                'Employees': ['ID_Emp', 'Name', 'Email', 'Password', 'Role'],
                'Resources': ['ID_Resource', 'Title', 'Link', 'Notes']
            };
            container.innerHTML = config[currentTab].map(f => {
                if (f.includes('ID')) return `<input type="hidden" name="${f}" value="${editData ? editData[f] : ''}">`;
                return `<input type="text" name="${f}" placeholder="${f}" value="${editData ? editData[f] : ''}" class="w-full p-4 bg-slate-50 rounded-2xl outline-none">`;
            }).join('');
            document.getElementById('entryModal').classList.add('active');
        }

        function closeModal() { document.getElementById('entryModal').classList.remove('active'); }
    </script>
</body>
</html>
