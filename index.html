<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>MESTIM ERP - OFFICE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 1000; }
        .modal.active { display: flex; }
        .sidebar-btn.active { background: #2563eb; color: white; }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center bg-slate-900 p-6">
        <form onsubmit="handleLogin(event)" class="bg-white p-10 rounded-[40px] w-full max-w-sm shadow-2xl space-y-4">
            <h1 class="text-3xl font-black text-slate-900 mb-6 italic tracking-tighter uppercase">Mestim <span class="text-blue-600 font-normal">ERP</span></h1>
            <input type="email" id="login-email" placeholder="Имейл" required class="w-full p-4 bg-slate-50 rounded-2xl outline-none">
            <input type="password" id="login-pass" placeholder="Парола" required class="w-full p-4 bg-slate-50 rounded-2xl outline-none">
            <button type="submit" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold uppercase">Вход</button>
        </form>
    </div>

    <!-- APP -->
    <div id="app-screen" class="hidden min-h-screen flex">
        <aside class="w-72 bg-slate-900 text-slate-400 p-8 shrink-0 flex flex-col shadow-2xl">
            <h1 class="text-white text-xl font-black mb-12 italic tracking-tighter uppercase leading-none">Mestim <span class="text-blue-500 block text-[10px] mt-1 font-bold">Office Center</span></h1>
            <nav class="space-y-2 flex-1">
                <button onclick="changeTab('Clients', this)" class="sidebar-btn active w-full text-left p-4 rounded-2xl font-bold transition-all">👥 Клиенти</button>
                <button onclick="changeTab('Employees', this)" class="sidebar-btn w-full text-left p-4 rounded-2xl font-bold transition-all">👷 Екип</button>
                <button onclick="changeTab('Resources', this)" class="sidebar-btn w-full text-left p-4 rounded-2xl font-bold transition-all">📚 Ресурси</button>
            </nav>
            <div class="pt-6 border-t border-slate-800 space-y-4">
                <button onclick="location.href='operations.html'" class="w-full p-4 bg-orange-600 text-white rounded-2xl font-bold text-xs uppercase tracking-widest">🚀 Отвори График</button>
                <button onclick="logout()" class="w-full text-left text-xs font-bold text-red-400 uppercase tracking-widest px-4">Изход</button>
            </div>
        </aside>

        <main class="flex-1 p-12 overflow-y-auto">
            <header class="flex justify-between items-center mb-12">
                <h2 id="section-title" class="text-4xl font-extrabold text-slate-900 italic">Клиенти</h2>
                <button onclick="openModal()" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold shadow-lg">+ ДОБАВИ НОВ</button>
            </header>
            <div class="bg-white rounded-[40px] shadow-sm border border-slate-100 overflow-hidden">
                <table class="w-full text-left"><thead id="table-head" class="bg-slate-50 border-b text-[10px] font-black text-slate-400 uppercase tracking-widest"></thead><tbody id="table-body" class="divide-y divide-slate-50"></tbody></table>
            </div>
        </main>
    </div>

    <div id="entryModal" class="modal"><div class="bg-white rounded-[40px] w-full max-w-lg p-10 shadow-2xl"><h3 id="modal-title" class="text-2xl font-bold mb-8">Запис</h3><form id="dataForm" onsubmit="handleSave(event)" class="space-y-4"><div id="form-fields" class="space-y-4"></div><div class="flex gap-4 pt-6"><button type="button" onclick="closeModal()" class="flex-1 p-4 bg-slate-50 rounded-2xl font-bold">Отказ</button><button type="submit" class="flex-1 p-4 bg-blue-600 text-white rounded-2xl font-bold uppercase">Запази</button></div></form></div></div>

    <script>
        // ВАЖНО: Постави новия URL тук
        const API_URL = 'https://script.google.com/macros/s/AKfycbzcyQt9yHa5BvQ_pkx84r-2ipgNwv4KAlaUchaXZkP6Jx0xmSZAMCqEAo24CUR4DPPS0w/exec';
        let currentTab = 'Clients', fullData = [];

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            const res = await fetch(`${API_URL}?action=LOGIN&email=${encodeURIComponent(email)}&pass=${encodeURIComponent(pass)}`);
            const result = await res.json();
            if (result.success) {
                localStorage.setItem('mestim_auth', 'true');
                localStorage.setItem('mestim_user', JSON.stringify(result.user));
                location.reload();
            } else { alert("Грешен вход!"); }
        }

        window.onload = () => {
            if (localStorage.getItem('mestim_auth') === 'true') {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                loadData();
            }
        };

        function logout() { localStorage.clear(); location.reload(); }

        async function loadData() {
            const tbody = document.getElementById('table-body');
            const thead = document.getElementById('table-head');
            tbody.innerHTML = '<tr><td class="p-20 text-center animate-pulse text-slate-400">Зареждане...</td></tr>';
            const res = await fetch(`${API_URL}?action=GET_DATA&tab=${currentTab}`);
            const result = await res.json();
            fullData = result.data || [];
            if (fullData.length > 0) {
                const keys = Object.keys(fullData[0]);
                thead.innerHTML = `<tr>${keys.map(k => `<th class="p-6">${k}</th>`).join('')}<th class="p-6"></th></tr>`;
                tbody.innerHTML = fullData.map((row, idx) => `
                    <tr class="hover:bg-slate-50 transition-colors border-b border-slate-50 text-sm">
                        ${keys.map(k => `<td class="p-6 text-slate-600 font-medium">${row[k] || ''}</td>`).join('')}
                        <td class="p-6 text-right space-x-3 text-lg">
                            <button onclick="openModal(${idx})" class="text-blue-500">✎</button>
                            <button onclick="deleteRow('${row[keys[0]]}')" class="text-red-400">✕</button>
                        </td>
                    </tr>`).join('');
            } else { tbody.innerHTML = '<tr><td class="p-20 text-center">Няма данни.</td></tr>'; }
        }

        async function handleSave(e) {
            e.preventDefault();
            const data = Object.fromEntries(new FormData(e.target).entries());
            const idKey = Object.keys(data).find(k => k.includes('ID'));
            if (!data[idKey]) data[idKey] = "ID-" + Math.floor(Math.random() * 900000);
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'SAVE_DATA', tab: currentTab, data: data }) });
            setTimeout(() => { closeModal(); loadData(); }, 1500);
        }

        async function deleteRow(id) {
            if (!confirm("Изтриване?")) return;
            await fetch(`${API_URL}?action=DELETE_DATA&tab=${currentTab}&id=${id}`, { method: 'POST' });
            setTimeout(loadData, 1000);
        }

        function changeTab(tab, btn) {
            currentTab = tab;
            document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('section-title').innerText = btn.innerText.split(' ')[1];
            loadData();
        }

        function openModal(idx = null) {
            const editData = idx !== null ? fullData[idx] : null;
            const container = document.getElementById('form-fields');
            const config = {
                'Clients': ['ID_Client', 'Name', 'Phone', 'Address_Main', 'Notes'],
                'Employees': ['ID_Emp', 'Name', 'Email', 'Phone', 'Password', 'Role'],
                'Resources': ['ID_Resource', 'Title', 'Link', 'Notes']
            };
            container.innerHTML = config[currentTab].map(f => {
                if (f.includes('ID')) return `<input type="hidden" name="${f}" value="${editData ? editData[f] : ''}">`;
                return `<input type="text" name="${f}" placeholder="${f}" value="${editData ? editData[f] : ''}" class="w-full p-4 bg-slate-50 rounded-2xl outline-none">`;
            }).join('');
            document.getElementById('entryModal').classList.add('active');
        }
        function closeModal() { document.getElementById('entryModal').classList.remove('active'); }
    </script>
</body>
</html>
