<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP OFFICE - Местим Всичко</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        h1, h2 { font-family: 'Montserrat', sans-serif; }
        .sidebar-btn.active { background: #1e293b; border-left: 4px solid #3b82f6; color: white; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(4px); }
        .modal.active { display: flex; }
    </style>
</head>
<body>

    <div class="flex min-h-screen">
        <aside class="w-64 bg-slate-900 text-slate-400 p-6 shrink-0 shadow-2xl">
            <h1 class="text-white text-xl font-bold mb-10 tracking-tighter">MESTIM <span class="text-blue-500 font-black">ERP</span></h1>
            <nav class="space-y-2">
                <button onclick="changeTab('Clients', this)" class="sidebar-btn active w-full text-left p-4 rounded-xl hover:bg-slate-800 transition-all flex items-center gap-3">👥 Клиенти</button>
                <button onclick="changeTab('Employees', this)" class="sidebar-btn w-full text-left p-4 rounded-xl hover:bg-slate-800 transition-all flex items-center gap-3">👷 Служители</button>
            </nav>
        </aside>

        <main class="flex-1 p-10">
            <header class="flex justify-between items-center mb-10">
                <h2 id="section-title" class="text-4xl font-extrabold text-slate-800 tracking-tight">Клиенти</h2>
                <button onclick="openModal()" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-100 transition-all">
                    + ДОБАВИ НОВ
                </button>
            </header>

            <div class="bg-white rounded-[32px] shadow-sm border border-slate-100 overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead id="table-head" class="bg-slate-50 border-b border-slate-100 text-xs font-bold text-slate-400 uppercase tracking-widest">
                        <tr><th class="p-6">Зареждане на системата...</th></tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-slate-50">
                        <!-- Данните идват тук -->
                    </tbody>
                </table>
                <div id="no-data" class="hidden py-20 text-center text-slate-400 italic">Няма данни за показване.</div>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div id="entryModal" class="modal">
        <div class="bg-white rounded-[32px] w-full max-w-md p-10 shadow-2xl border border-slate-100">
            <h3 class="text-2xl font-bold mb-6 text-slate-900">Нов запис</h3>
            <form id="dataForm" onsubmit="handleSave(event)" class="space-y-5">
                <div id="form-fields" class="space-y-4"></div>
                <div class="flex gap-4 pt-6">
                    <button type="button" onclick="closeModal()" class="flex-1 p-4 bg-slate-100 rounded-2xl font-bold text-slate-500 hover:bg-slate-200">Отказ</button>
                    <button type="submit" id="saveBtn" class="flex-1 p-4 bg-blue-600 text-white rounded-2xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-100">Запази</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ПОСТАВИ НОВИЯ URL ТУК:
        const API_URL = 'https://script.google.com/macros/s/AKfycbzM7ZG2z84hI8N-ATyjtobInZDz43wnwG2Dv03YClBwEmmdUMrVoKHqMcEDl2Pj8CaXuw/exec'; 

        let currentTab = 'Clients';

        window.onload = loadData;

        async function loadData() {
            const tbody = document.getElementById('table-body');
            const thead = document.getElementById('table-head');
            const noData = document.getElementById('no-data');
            
            tbody.innerHTML = '<tr><td class="p-20 text-center animate-pulse text-slate-400 italic font-medium">Синхронизиране с облака...</td></tr>';
            noData.classList.add('hidden');

            try {
                // Използваме стандартен GET, който Google винаги позволява
                const response = await fetch(`${API_URL}?action=GET_DATA&tab=${currentTab}`);
                const result = await response.json();

                if (result.success && result.data && result.data.length > 0) {
                    const keys = Object.keys(result.data[0]);
                    thead.innerHTML = `<tr>${keys.map(k => `<th class="p-6">${k.replace(/_/g, ' ')}</th>`).join('')}</tr>`;
                    tbody.innerHTML = result.data.map(row => `
                        <tr class="hover:bg-blue-50/50 transition-colors border-b border-slate-50">
                            ${keys.map(k => `<td class="p-6 text-sm text-slate-600 font-medium">${row[k] || ''}</td>`).join('')}
                        </tr>
                    `).join('');
                } else {
                    thead.innerHTML = '';
                    tbody.innerHTML = '';
                    noData.classList.remove('hidden');
                }
            } catch (e) {
                console.error(e);
                tbody.innerHTML = '<tr><td class="p-20 text-red-500 text-center font-bold">ГРЕШКА ВЪВ ВРЪЗКАТА! Моля, проверете API URL.</td></tr>';
            }
        }

        async function changeTab(tab, btn) {
            currentTab = tab;
            document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('section-title').innerText = (tab === 'Clients' ? 'Клиенти' : 'Служители');
            loadData();
        }

        function openModal() {
            const container = document.getElementById('form-fields');
            if (currentTab === 'Clients') {
                container.innerHTML = `
                    <input type="text" name="Name" placeholder="Име на клиент" required class="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 border-none transition-all">
                    <input type="text" name="Phone" placeholder="Телефон" required class="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 border-none transition-all">
                `;
            } else {
                container.innerHTML = `
                    <input type="text" name="Name" placeholder="Име на служител" required class="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 border-none transition-all">
                    <input type="email" name="Email" placeholder="Имейл" required class="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 border-none transition-all">
                    <input type="text" name="Password" placeholder="Парола" required class="w-full p-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 border-none transition-all">
                `;
            }
            document.getElementById('entryModal').classList.add('active');
        }

        function closeModal() { document.getElementById('entryModal').classList.remove('active'); }

        async function handleSave(e) {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            btn.innerText = 'Записване...';

            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            data[currentTab === 'Clients' ? 'ID_Client' : 'ID_Emp'] = 'ID-' + Math.floor(Math.random() * 9000);

            try {
                // Използваме POST без никакви хедъри - това е ключът за CORS
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Изпращаме го, но не чакаме отговор за потвърждение (Simple Request)
                    body: JSON.stringify({ action: 'SAVE_DATA', tab: currentTab, data: data })
                });
                
                // Тъй като 'no-cors' не ни дава да четем отговора, просто изчакваме малко и презареждаме
                setTimeout(() => {
                    closeModal();
                    loadData();
                    btn.disabled = false;
                    btn.innerText = 'Запази';
                }, 1500);

            } catch (err) {
                alert('Грешка при запис. Проверете конзолата.');
                btn.disabled = false;
                btn.innerText = 'Запази';
            }
        }
    </script>
</body>
</html>
