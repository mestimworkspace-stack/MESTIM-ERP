<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP OFFICE - Местим Всичко</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        h1, h2, h3 { font-family: 'Montserrat', sans-serif; }
        .sidebar-item { transition: all 0.2s; border-left: 4px solid transparent; }
        .sidebar-item.active { background: #1e293b; border-left: 4px solid #3b82f6; color: white; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal.active { display: flex; }
        .btn-hover { transition: all 0.2s; }
        .btn-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body>

    <div class="flex min-h-screen">
        <!-- SIDEBAR -->
        <aside class="w-72 bg-slate-900 text-slate-400 p-8 shrink-0 shadow-2xl">
            <div class="mb-12">
                <h1 class="text-white text-2xl font-black tracking-tighter">MESTIM <span class="text-blue-500 text-sm block tracking-widest uppercase text-opacity-80">ERP System</span></h1>
            </div>
            
            <nav class="space-y-3">
                <button onclick="changeTab('Clients', this)" class="sidebar-item active w-full text-left p-4 rounded-xl flex items-center gap-3 hover:text-white group">
                    <span class="text-xl group-hover:scale-110 transition">👥</span> Клиенти
                </button>
                <button onclick="changeTab('Employees', this)" class="sidebar-item w-full text-left p-4 rounded-xl flex items-center gap-3 hover:text-white group">
                    <span class="text-xl group-hover:scale-110 transition">👷</span> Служители
                </button>
                <button onclick="changeTab('Resources', this)" class="sidebar-item w-full text-left p-4 rounded-xl flex items-center gap-3 hover:text-white group">
                    <span class="text-xl group-hover:scale-110 transition">📚</span> Ресурси
                </button>
            </nav>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="flex-1 p-12">
            <div class="max-w-6xl mx-auto">
                <header class="flex justify-between items-end mb-12">
                    <div>
                        <h2 id="section-title" class="text-5xl font-extrabold text-slate-900 tracking-tight">Клиенти</h2>
                        <p class="text-slate-500 mt-2 font-medium">Управление на фирмените данни в реално време</p>
                    </div>
                    <button onclick="openModal()" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 btn-hover">
                        + ДОБАВИ НОВ
                    </button>
                </header>

                <!-- DATA TABLE -->
                <div class="bg-white rounded-[32px] shadow-sm border border-slate-100 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr id="table-headers" class="bg-slate-50/50 border-b border-slate-100">
                                    <th class="p-6 text-slate-400 font-bold uppercase text-xs tracking-widest text-center">Зареждане на базата данни...</th>
                                </tr>
                            </thead>
                            <tbody id="table-body" class="divide-y divide-slate-50">
                                <!-- Редовете се генерират тук -->
                            </tbody>
                        </table>
                    </div>
                    <div id="no-data" class="hidden py-32 text-center">
                        <div class="text-6xl mb-4">📂</div>
                        <p class="text-slate-400 font-medium">Няма намерени записи в тази секция.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- MODAL FORM -->
    <div id="entryModal" class="modal">
        <div class="bg-white rounded-[40px] w-full max-w-lg p-10 shadow-2xl relative border border-slate-100">
            <div class="flex justify-between items-center mb-8">
                <h3 id="modal-title" class="text-3xl font-bold text-slate-900 uppercase tracking-tighter">Нов запис</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 text-2xl">✕</button>
            </div>
            
            <form id="dataForm" onsubmit="handleSave(event)" class="space-y-5">
                <div id="form-fields" class="space-y-4">
                    <!-- Полетата се генерират динамично -->
                </div>
                
                <div class="flex gap-4 pt-6">
                    <button type="button" onclick="closeModal()" class="flex-1 px-6 py-4 rounded-2xl font-bold text-slate-500 bg-slate-100 hover:bg-slate-200 transition">Отказ</button>
                    <button type="submit" id="saveBtn" class="flex-1 px-6 py-4 rounded-2xl font-bold text-white bg-blue-600 hover:bg-blue-700 shadow-xl shadow-blue-100 transition">Запази</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // --- КОНФИГУРАЦИЯ ---
        // ЗАМЕНИ ТОВА С ТВОЯ URL ОТ DEPLOY:
        const API_URL = 'https://script.google.com/macros/s/AKfycbwAKelVaD8tyPQFtIroMFbEwGlxJhaomGWsTKw_JlAjMyhjwQ2oqy5pBnhD_S38UiAL6Q/exec'; 
        
        let currentTab = 'Clients';

        // Инициализация
        window.onload = () => {
            if (API_URL.includes('https://script.google.com/macros/s/AKfycbwAKelVaD8tyPQFtIroMFbEwGlxJhaomGWsTKw_JlAjMyhjwQ2oqy5pBnhD_S38UiAL6Q/exec')) {
                alert("https://script.google.com/macros/s/AKfycbwAKelVaD8tyPQFtIroMFbEwGlxJhaomGWsTKw_JlAjMyhjwQ2oqy5pBnhD_S38UiAL6Q/exec");
            }
            loadData();
        };

        async function changeTab(tabName, element) {
            currentTab = tabName;
            document.querySelectorAll('.sidebar-item').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            document.getElementById('section-title').innerText = element.innerText.split(' ')[1];
            loadData();
        }

        async function loadData() {
            const tbody = document.getElementById('table-body');
            const headers = document.getElementById('table-headers');
            const noData = document.getElementById('no-data');

            tbody.innerHTML = '<tr><td colspan="20" class="p-20 text-center text-slate-400 animate-pulse">Синхронизиране с облака...</td></tr>';
            noData.classList.add('hidden');

            try {
                // Използваме POST без headers за избягване на CORS грешки
                const response = await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Опитваме no-cors първо, но GAS иска cors за JSON.
                    // При GAS работи най-добре стандартен fetch, ако скриптът е пуснат правилно
                });

                // Тъй като 'no-cors' не позволява четене на тялото, 
                // правим стандартна заявка, която GAS поддържа при правилен Deploy:
                const cleanResponse = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'GET_DATA', tab: currentTab })
                });
                
                const result = await cleanResponse.json();

                if (result.success && result.data.length > 0) {
                    const keys = Object.keys(result.data[0]);
                    headers.innerHTML = keys.map(k => `<th class="p-6 text-slate-500 font-bold uppercase text-xs tracking-widest">${k.replace(/_/g, ' ')}</th>`).join('');
                    tbody.innerHTML = result.data.map(row => `
                        <tr class="hover:bg-blue-50/40 transition-colors border-b border-slate-50">
                            ${keys.map(k => `<td class="p-6 text-slate-700 text-sm font-medium">${row[k] || '-'}</td>`).join('')}
                        </tr>
                    `).join('');
                } else {
                    headers.innerHTML = '';
                    tbody.innerHTML = '';
                    noData.classList.remove('hidden');
                }
            } catch (error) {
                console.error(error);
                tbody.innerHTML = `<tr><td colspan="20" class="p-20 text-center text-red-500 font-bold">ГРЕШКА ПРИ ВРЪЗКА. Моля, проверете API Deployment-а.</td></tr>`;
            }
        }

        function openModal() {
            const container = document.getElementById('form-fields');
            let fields = '';

            if (currentTab === 'Clients') {
                fields = `
                    <div class="space-y-1"><label class="text-xs font-bold text-slate-400 ml-2 uppercase">Име на Клиент</label><input type="text" name="Name" required class="w-full p-4 bg-slate-50 border-0 rounded-2xl focus:ring-2 focus:ring-blue-500 transition outline-none"></div>
                    <div class="space-y-1"><label class="text-xs font-bold text-slate-400 ml-2 uppercase">Телефон</label><input type="text" name="Phone" required class="w-full p-4 bg-slate-50 border-0 rounded-2xl focus:ring-2 focus:ring-blue-500 transition outline-none"></div>
                    <div class="space-y-1"><label class="text-xs font-bold text-slate-400 ml-2 uppercase">Адрес</label><input type="text" name="Address_Main" class="w-full p-4 bg-slate-50 border-0 rounded-2xl focus:ring-2 focus:ring-blue-500 transition outline-none"></div>
                `;
            } else if (currentTab === 'Employees') {
                fields = `
                    <div class="space-y-1"><label class="text-xs font-bold text-slate-400 ml-2 uppercase">Име</label><input type="text" name="Name" required class="w-full p-4 bg-slate-50 border-0 rounded-2xl focus:ring-2 focus:ring-blue-500 transition outline-none"></div>
                    <div class="space-y-1"><label class="text-xs font-bold text-slate-400 ml-2 uppercase">Имейл</label><input type="email" name="Email" required class="w-full p-4 bg-slate-50 border-0 rounded-2xl focus:ring-2 focus:ring-blue-500 transition outline-none"></div>
                    <div class="space-y-1"><label class="text-xs font-bold text-slate-400 ml-2 uppercase">Парола</label><input type="text" name="Password" required class="w-full p-4 bg-slate-50 border-0 rounded-2xl focus:ring-2 focus:ring-blue-500 transition outline-none"></div>
                    <div class="space-y-1"><label class="text-xs font-bold text-slate-400 ml-2 uppercase">Роля</label>
                        <select name="Role" class="w-full p-4 bg-slate-50 border-0 rounded-2xl focus:ring-2 focus:ring-blue-500 transition outline-none">
                            <option value="Employee">Employee</option>
                            <option value="Manager">Manager</option>
                            <option value="Admin">Admin</option>
                        </select>
                    </div>
                `;
            }

            container.innerHTML = fields;
            document.getElementById('modal-title').innerText = "Нов " + currentTab.slice(0, -1);
            document.getElementById('entryModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('entryModal').classList.remove('active');
        }

        async function handleSave(e) {
            e.preventDefault();
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true;
            saveBtn.innerText = "Записване...";

            const formData = new FormData(e.target);
            const payload = Object.fromEntries(formData.entries());
            
            // Генерираме уникално ID спрямо таба
            const idKey = currentTab === 'Clients' ? 'ID_Client' : 'ID_Emp';
            payload[idKey] = "ID-" + Math.floor(Math.random() * 10000);

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'SAVE_DATA', tab: currentTab, data: payload })
                });
                const result = await response.json();
                if (result.success) {
                    closeModal();
                    loadData();
                } else {
                    alert("Грешка: " + result.error);
                }
            } catch (error) {
                alert("Неуспешно свързване със сървъра.");
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerText = "Запази";
            }
        }
    </script>
</body>
</html>
