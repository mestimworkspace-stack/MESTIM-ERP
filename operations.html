<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>MESTIM OPS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-100 font-sans">
    <div id="app-screen" class="hidden min-h-screen flex">
        <aside class="w-72 bg-slate-900 text-white p-8 flex flex-col">
            <h1 class="text-xl font-black italic uppercase mb-10">Mestim <span class="text-blue-500">Ops</span></h1>
            <button onclick="openModal()" class="w-full bg-blue-600 p-5 rounded-2xl font-bold mb-6 tracking-widest shadow-xl shadow-blue-900/40">+ ПОРЪЧКА</button>
            <div class="flex-1"></div>
            <button onclick="location.href='index.html'" class="p-4 border border-slate-700 rounded-xl text-[10px] font-black uppercase">⬅ Назад в Офис</button>
        </aside>
        <main class="flex-1 p-8"><div id="calendar" class="bg-white p-8 rounded-[40px] shadow-2xl"></div></main>
    </div>

    <!-- MODAL -->
    <div id="modal" class="hidden fixed inset-0 bg-black/80 z-[1000] flex items-center justify-center p-4">
        <div class="bg-white p-10 rounded-[40px] w-full max-w-4xl shadow-2xl flex gap-10">
            <form onsubmit="handleSave(event)" id="form" class="flex-1 space-y-4">
                <input type="hidden" name="ID_Order" id="oid">
                <h3 class="text-2xl font-black italic uppercase">Поръчка</h3>
                <div class="grid grid-cols-2 gap-4">
                    <input list="clist" name="ClientName" id="cn" oninput="sync('n')" placeholder="Клиент" required class="p-4 bg-slate-100 rounded-2xl outline-none"><datalist id="clist"></datalist>
                    <input list="plist" name="Phone" id="cp" oninput="sync('p')" placeholder="Телефон" required class="p-4 bg-slate-100 rounded-2xl outline-none"><datalist id="plist"></datalist>
                    <select name="Service" class="p-4 bg-slate-100 rounded-2xl font-bold"><option>Преместване</option><option>Работа на екип</option><option>Изхвърляне строителни</option><option>Изхвърляне мебели</option><option>Транспорт</option><option>Оглед</option><option>Монтаж</option></select>
                    <input type="date" name="Date" id="od" required class="p-4 bg-slate-100 rounded-2xl outline-none">
                    <input type="time" name="TimeStart" required class="p-4 bg-slate-100 rounded-2xl outline-none">
                    <input type="time" name="TimeEnd" required class="p-4 bg-slate-100 rounded-2xl outline-none">
                    <input type="text" name="AddrStart" placeholder="Адрес" class="p-4 bg-slate-100 rounded-2xl col-span-2 outline-none">
                    <textarea name="Description" placeholder="Описание..." class="p-4 bg-slate-100 rounded-2xl col-span-2 h-24 outline-none"></textarea>
                </div>
                <div class="flex gap-4"><button type="button" onclick="closeModal()" class="flex-1 p-4 bg-slate-100 rounded-2xl font-bold">Отказ</button><button type="submit" class="flex-1 p-4 bg-blue-600 text-white rounded-2xl font-bold">ЗАПАЗИ</button></div>
            </form>
            <div class="w-64 border-l pl-8 space-y-4">
                <p class="font-bold uppercase text-[10px]">Назначи Екип</p>
                <div id="elist" class="space-y-2 max-h-[400px] overflow-y-auto"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbyQelM5bDNtGj1NBIBhgoBzeKr0FTPaXLp52II59H_c8eBWJ6HBCTAgk2sOAqgeCBsdUg/exec';
        let calendar, orders = [], employees = [], clients = [];

        window.onload = () => {
            if (localStorage.getItem('mestim_auth') !== 'true') location.href = 'index.html';
            else { document.getElementById('app-screen').classList.remove('hidden'); initCalendar(); loadAll(); }
        };
        async function loadAll() {
            const [o, e, c] = await Promise.all([fetch(`${API_URL}?action=GET_DATA&tab=Orders`).then(r=>r.json()), fetch(`${API_URL}?action=GET_DATA&tab=Employees`).then(r=>r.json()), fetch(`${API_URL}?action=GET_DATA&tab=Clients`).then(r=>r.json())]);
            orders = o.data || []; employees = e.data || []; clients = c.data || [];
            document.getElementById('clist').innerHTML = clients.map(x=>`<option value="${x.Name}">`).join('');
            document.getElementById('plist').innerHTML = clients.map(x=>`<option value="${x.Phone}">`).join('');
            document.getElementById('elist').innerHTML = employees.map(x=>`<label class="flex gap-3 p-3 bg-slate-50 rounded-xl font-bold text-xs"><input type="checkbox" name="emp" value="${x.ID_Emp}">${x.Name}</label>`).join('');
            calendar.refetchEvents();
        }
        function initCalendar(){
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'timeGridDay', locale:'bg', height: 'auto', headerToolbar: {left:'prev,next today', center:'title', right:'dayGridMonth,timeGridWeek,timeGridDay'},
                events: (info, success) => {
                    const colors = {'Преместване':'#3b82f6','Работа на екип':'#10b981','Изхвърляне строителни':'#f59e0b','Изхвърляне мебели':'#ef4444','Транспорт':'#8b5cf6','Оглед':'#06b6d4','Монтаж':'#ec4899'};
                    success(orders.map(x=>({id:x.ID_Order, title:`${x.ClientName} (${x.Service})`, start:`${x.Date}T${x.TimeStart}`, end:`${x.Date}T${x.TimeEnd}`, backgroundColor:colors[x.Service]||'#64748b', extendedProps:x})));
                },
                eventClick: (info) => openModal(info.event.extendedProps)
            });
            calendar.render();
        }
        function sync(t){
            const n = document.getElementById('cn'), p = document.getElementById('cp');
            if(t==='n'){ const m = clients.find(x=>x.Name === n.value); if(m) p.value = m.Phone; }
            else { const m = clients.find(x=>x.Phone.toString() === p.value); if(m) n.value = m.Name; }
        }
        async function handleSave(e){
            e.preventDefault();
            const d = Object.fromEntries(new FormData(e.target).entries());
            d.Assignments = Array.from(document.querySelectorAll('input[name="emp"]:checked')).map(x=>x.value).join(',');
            if(!d.ID_Order) d.ID_Order = "ORD-"+Date.now();
            await fetch(API_URL, {method:'POST', mode:'no-cors', body:JSON.stringify({action:'SAVE_DATA', tab:'Orders', data:d})});
            closeModal(); setTimeout(loadAll, 1500);
        }
        function openModal(d=null){
            const f = document.getElementById('form'); f.reset();
            document.querySelectorAll('input[name="emp"]').forEach(x=>x.checked = false);
            if(d && d.ID_Order){
                document.getElementById('oid').value = d.ID_Order;
                Object.keys(d).forEach(k=>{ if(f.elements[k]) f.elements[k].value = d[k]; });
                if(d.Assignments) d.Assignments.split(',').forEach(id=>{ const cb = document.querySelector(`input[name="emp"][value="${id}"]`); if(cb) cb.checked=true; });
            } else { document.getElementById('oid').value = ''; document.getElementById('od').value = new Date().toISOString().split('T')[0]; }
            document.getElementById('modal').classList.remove('hidden');
        }
        function closeModal(){ document.getElementById('modal').classList.add('hidden'); }
    </script>
</body>
</html>
