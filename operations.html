<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>MESTIM OPERATIONS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-100 font-sans">
    <div id="app-screen" class="hidden min-h-screen flex">
        <aside class="w-72 bg-slate-900 text-white p-8 flex flex-col">
            <h1 class="text-xl font-black italic uppercase mb-10">Mestim <span class="text-blue-500">Ops</span></h1>
            <button onclick="openModal()" class="w-full bg-blue-600 p-5 rounded-2xl font-bold mb-6">+ НОВА ПОРЪЧКА</button>
            <div class="flex-1"></div>
            <button onclick="location.href='index.html'" class="p-4 border border-slate-700 rounded-xl text-xs font-bold uppercase">⬅ Назад в Офис</button>
        </aside>
        <main class="flex-1 p-8"><div id="calendar" class="bg-white p-6 rounded-[32px] shadow-xl"></div></main>
    </div>

    <!-- MODAL -->
    <div id="o-modal" class="hidden fixed inset-0 bg-black/80 z-[1000] flex items-center justify-center">
        <div class="bg-white p-10 rounded-[40px] w-full max-w-4xl shadow-2xl flex gap-8 text-sm">
            <form onsubmit="handleSave(event)" id="o-form" class="flex-1 space-y-4">
                <input type="hidden" name="ID_Order" id="o-id">
                <h3 class="text-2xl font-black italic uppercase">Поръчка</h3>
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-1"><input list="c-names" name="ClientName" id="c-name" oninput="sync('name')" placeholder="Клиент" required class="w-full p-4 bg-slate-100 rounded-2xl outline-none"><datalist id="c-names"></datalist></div>
                    <div class="col-span-1"><input list="c-phones" name="Phone" id="c-phone" oninput="sync('phone')" placeholder="Телефон" required class="w-full p-4 bg-slate-100 rounded-2xl outline-none"><datalist id="c-phones"></datalist></div>
                    <select name="Service" class="w-full p-4 bg-slate-100 rounded-2xl font-bold"><option>Преместване</option><option>Работа на екип</option><option>Изхвърляне строителни</option><option>Изхвърляне мебели</option><option>Транспорт</option><option>Оглед</option><option>Монтаж</option></select>
                    <input type="date" name="Date" id="o-date" required class="w-full p-4 bg-slate-100 rounded-2xl">
                    <input type="time" name="TimeStart" required class="w-full p-4 bg-slate-100 rounded-2xl">
                    <input type="time" name="TimeEnd" required class="w-full p-4 bg-slate-100 rounded-2xl">
                    <input type="text" name="AddrStart" placeholder="Адрес" class="w-full p-4 bg-slate-100 rounded-2xl col-span-2">
                    <textarea name="Description" placeholder="Описание..." class="w-full p-4 bg-slate-100 rounded-2xl col-span-2 h-20"></textarea>
                </div>
                <div class="flex gap-4 mt-4"><button type="button" onclick="closeModal()" class="flex-1 p-4 bg-slate-100 rounded-2xl font-bold text-slate-400">Отказ</button><button type="submit" class="flex-1 p-4 bg-blue-600 text-white rounded-2xl font-bold uppercase">Запази</button></div>
            </form>
            <div class="w-64 border-l pl-8"><p class="font-bold uppercase text-[10px] mb-4">Назначи Екип</p><div id="e-list" class="space-y-2 max-h-[400px] overflow-y-auto"></div></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbz9qB0n9gT9YPEvny4por1EA1euuyFy23k2SMCv46VavPKs7CAwwnE-RuTM1cLpjzNbhA/exec';
        let calendar, orders = [], employees = [], clients = [];

        window.onload = () => {
            if (localStorage.getItem('mestim_auth') !== 'true') location.href = 'index.html';
            else { document.getElementById('app-screen').classList.remove('hidden'); initCalendar(); loadAll(); }
        };
        async function loadAll() {
            const [o, e, c] = await Promise.all([fetch(`${API_URL}?action=GET_DATA&tab=Orders`).then(r=>r.json()), fetch(`${API_URL}?action=GET_DATA&tab=Employees`).then(r=>r.json()), fetch(`${API_URL}?action=GET_DATA&tab=Clients`).then(r=>r.json())]);
            orders = o.data || []; employees = e.data || []; clients = c.data || [];
            document.getElementById('c-names').innerHTML = clients.map(x=>`<option value="${x.Name}">`).join('');
            document.getElementById('c-phones').innerHTML = clients.map(x=>`<option value="${x.Phone}">`).join('');
            document.getElementById('e-list').innerHTML = employees.map(x=>`<label class="flex gap-2 p-2 bg-slate-50 rounded-lg"><input type="checkbox" name="emp" value="${x.ID_Emp}">${x.Name}</label>`).join('');
            calendar.refetchEvents();
        }
        function initCalendar(){
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'timeGridDay', locale:'bg', headerToolbar: {left:'prev,next today', center:'title', right:'dayGridMonth,timeGridWeek,timeGridDay'},
                events: (info, success) => {
                    const colors = {'Преместване':'#3b82f6','Работа на екип':'#10b981','Изхвърляне строителни':'#f59e0b','Изхвърляне мебели':'#ef4444'};
                    success(orders.map(x=>({id:x.ID_Order, title:x.ClientName, start:`${x.Date}T${x.TimeStart}`, end:`${x.Date}T${x.TimeEnd}`, backgroundColor:colors[x.Service]||'#64748b', extendedProps:x})));
                },
                eventClick: (info) => openModal(info.event.extendedProps)
            });
            calendar.render();
        }
        function sync(type){
            if(type==='name'){ const m = clients.find(x=>x.Name === document.getElementById('c-name').value); if(m) document.getElementById('c-phone').value = m.Phone; }
            else { const m = clients.find(x=>x.Phone.toString() === document.getElementById('c-phone').value); if(m) document.getElementById('c-name').value = m.Name; }
        }
        async function handleSave(e){
            e.preventDefault();
            const d = Object.fromEntries(new FormData(e.target).entries());
            d.Assignments = Array.from(document.querySelectorAll('input[name="emp"]:checked')).map(x=>x.value).join(',');
            if(!d.ID_Order) d.ID_Order = "ORD-"+Date.now();
            await fetch(API_URL, {method:'POST', mode:'no-cors', body:JSON.stringify({action:'SAVE_DATA', tab:'Orders', data:d})});
            closeModal(); setTimeout(loadAll, 1200);
        }
        function openModal(d=null){
            const f = document.getElementById('o-form'); f.reset();
            document.querySelectorAll('input[name="emp"]').forEach(x=>x.checked = false);
            if(d){
                document.getElementById('o-id').value = d.ID_Order;
                Object.keys(d).forEach(k=>{ if(f.elements[k]) f.elements[k].value = d[k]; });
                if(d.Assignments) d.Assignments.split(',').forEach(id=>{ const cb = document.querySelector(`input[name="emp"][value="${id}"]`); if(cb) cb.checked=true; });
            } else { document.getElementById('o-id').value = ''; document.getElementById('o-date').value = new Date().toISOString().split('T')[0]; }
            document.getElementById('o-modal').classList.remove('hidden');
        }
        function closeModal(){ document.getElementById('o-modal').classList.add('hidden'); }
    </script>
</body>
</html>
