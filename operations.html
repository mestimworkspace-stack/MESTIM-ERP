<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>MESTIM ERP - OPERATIONS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(8px); }
        .modal.active { display: flex; }
        .fc { background: white; padding: 20px; border-radius: 32px; height: 85vh; border: none; box-shadow: 0 10px 30px -5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <!-- APP SCREEN -->
    <div id="app-screen" class="hidden min-h-screen flex">
        <aside class="w-72 bg-slate-900 text-slate-400 p-8 shrink-0 flex flex-col">
            <h1 class="text-white text-xl font-black mb-12 italic uppercase tracking-tighter">Mestim <span class="text-blue-500 block text-[10px] mt-1 font-bold tracking-[0.3em]">Ops Center</span></h1>
            <div class="flex-1 space-y-4">
                <button onclick="openModal()" class="w-full bg-blue-600 text-white p-5 rounded-2xl font-bold hover:bg-blue-700 shadow-xl mb-6 tracking-widest">+ НОВА ПОРЪЧКА</button>
            </div>
            <button onclick="location.href='index.html'" class="w-full p-4 rounded-xl border border-slate-700 text-xs font-bold text-white hover:bg-slate-800 transition uppercase tracking-widest mb-4">⬅ Назад към Офис</button>
        </aside>

        <main class="flex-1 p-8 overflow-y-auto">
            <div id="calendar"></div>
        </main>
    </div>

    <!-- ORDER MODAL -->
    <div id="orderModal" class="modal">
        <div class="bg-white rounded-[40px] w-full max-w-4xl p-10 shadow-2xl flex gap-8">
            <form id="orderForm" onsubmit="handleSave(event)" class="flex-1 space-y-4">
                <input type="hidden" name="ID_Order" id="form-id">
                <h3 id="modal-title" class="text-2xl font-black mb-4 uppercase italic">Поръчка</h3>
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2"><input name="ClientName" placeholder="Име на клиент" required autocomplete="off" class="w-full p-4 bg-slate-50 rounded-2xl outline-none border-2 border-transparent focus:border-blue-500"></div>
                    <input type="text" name="Phone" placeholder="Телефон" required autocomplete="off" class="w-full p-4 bg-slate-50 rounded-2xl outline-none">
                    <select name="Service" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold">
                        <option>Преместване</option><option>Работа на екип</option><option>Изхвърляне строителни</option><option>Изхвърляне мебели</option><option>Транспорт</option><option>Оглед</option><option>Монтаж</option>
                    </select>
                    <input type="date" name="Date" required id="form-date" class="w-full p-4 bg-slate-50 rounded-2xl outline-none">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="time" name="TimeStart" required class="w-full p-4 bg-slate-50 rounded-2xl outline-none">
                        <input type="time" name="TimeEnd" required class="w-full p-4 bg-slate-50 rounded-2xl outline-none">
                    </div>
                    <input type="text" name="AddrStart" placeholder="Адрес" autocomplete="off" class="w-full p-4 bg-slate-50 rounded-2xl outline-none col-span-2">
                </div>
                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="closeModal()" class="flex-1 p-5 bg-slate-100 rounded-2xl font-bold text-slate-400">Отказ</button>
                    <button type="submit" class="flex-1 p-5 bg-blue-600 text-white rounded-2xl font-bold uppercase shadow-xl">Запази</button>
                </div>
            </form>
            <div class="w-64 border-l pl-8 space-y-4">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest italic">Екип</p>
                <div id="employees-list" class="space-y-2 overflow-y-auto max-h-[400px]"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwT8AhziY3Z1BxkrEeotyS3cbr5usToYS_E5R8LCrfHlnF_8b6hjWu0eQLpBpbe8qzJ-Q/exec';
        let calendar;

        window.onload = () => {
            // ПРОВЕРКА ЗА АВТОМАТИЧЕН ВХОД ОТ OFFICE
            if (localStorage.getItem('mestim_auth') !== 'true') {
                alert("Моля, влезте в системата през главната страница!");
                window.location.href = 'index.html';
                return;
            }
            document.getElementById('app-screen').classList.remove('hidden');
            initCalendar();
            loadEmployees();
        };

        function initCalendar() {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'timeGridDay',
                locale: 'bg',
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek,timeGridDay' },
                events: (info, success) => loadEvents(success),
                eventClick: (info) => openModal(info.event.extendedProps.originalData)
            });
            calendar.render();
        }

        async function loadEvents(success) {
            const res = await fetch(`${API_URL}?action=GET_DATA&tab=Orders`).then(r => r.json());
            const svcColors = { 'Преместване': '#3b82f6', 'Работа на екип': '#10b981', 'Изхвърляне строителни': '#f59e0b', 'Изхвърляне мебели': '#ef4444', 'Транспорт': '#8b5cf6', 'Оглед': '#06b6d4', 'Монтаж': '#ec4899' };
            const events = (res.data || []).map(o => ({
                id: o.ID_Order,
                title: `${o.ClientName} (${o.Service})`,
                start: `${o.Date.split('T')[0]}T${o.TimeStart}`,
                end: `${o.Date.split('T')[0]}T${o.TimeEnd}`,
                backgroundColor: svcColors[o.Service] || '#64748b',
                extendedProps: { originalData: o }
            }));
            success(events);
        }

        async function loadEmployees() {
            const res = await fetch(`${API_URL}?action=GET_DATA&tab=Employees`).then(r => r.json());
            document.getElementById('employees-list').innerHTML = (res.data || []).map(e => `
                <label class="flex items-center gap-3 p-3 bg-slate-50 rounded-xl cursor-pointer hover:bg-blue-50 transition">
                    <input type="checkbox" name="emp" value="${e.ID_Emp}" class="w-5 h-5 rounded-lg text-blue-600">
                    <span class="text-xs font-bold text-slate-700">${e.Name}</span>
                </label>
            `).join('');
        }

        async function handleSave(e) {
            e.preventDefault();
            const data = Object.fromEntries(new FormData(e.target).entries());
            data.Assignments = Array.from(document.querySelectorAll('input[name="emp"]:checked')).map(cb => cb.value).join(',');
            if(!data.ID_Order) data.ID_Order = 'ORD-' + Math.floor(Math.random()*900000);
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'SAVE_DATA', tab: 'Orders', data: data }) });
            setTimeout(() => { closeModal(); calendar.refetchEvents(); }, 1200);
        }

        function openModal(data = null) {
            const form = document.getElementById('orderForm');
            form.reset();
            document.querySelectorAll('input[name="emp"]').forEach(cb => cb.checked = false);
            if(data) {
                document.getElementById('form-id').value = data.ID_Order;
                Object.keys(data).forEach(k => { if(form.elements[k]) form.elements[k].value = (k === 'Date' ? data[k].split('T')[0] : data[k]); });
                if(data.Assignments) {
                    const ids = data.Assignments.split(',');
                    document.querySelectorAll('input[name="emp"]').forEach(cb => { if(ids.includes(cb.value)) cb.checked = true; });
                }
            } else {
                document.getElementById('form-id').value = '';
                document.getElementById('form-date').value = new Date().toISOString().split('T')[0];
            }
            document.getElementById('orderModal').classList.add('active');
        }

        function closeModal() { document.getElementById('orderModal').classList.remove('active'); }
    </script>
</body>
</html>
