<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MESTIM ERP - OPERATIONS</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FullCalendar CSS & JS -->
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
        h1, h2 { font-family: 'Montserrat', sans-serif; }
        
        /* Персонализиране на FullCalendar */
        .fc { background: white; padding: 20px; border-radius: 32px; border: none; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); height: 80vh; }
        .fc-toolbar-title { font-family: 'Montserrat', sans-serif !important; font-weight: 800 !important; text-transform: uppercase; italic; }
        .fc-button-primary { background: #1e293b !important; border: none !important; border-radius: 12px !important; font-weight: bold !important; text-transform: uppercase; font-size: 11px !important; }
        .fc-button-active { background: #2563eb !important; }
        .fc-event { border-radius: 8px !important; border: none !important; padding: 4px 8px !important; cursor: pointer; font-weight: 600; }

        /* Модал */
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.85); align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(10px); }
        .modal.active { display: flex; }
        #loader { display: none; position: fixed; inset: 0; background: white; z-index: 2000; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; }
        
        /* Полета за избор на екип */
        .emp-badge { display: inline-block; padding: 2px 8px; background: rgba(255,255,255,0.3); border-radius: 4px; margin-right: 4px; font-size: 10px; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
        <p class="text-blue-600 font-bold uppercase tracking-widest text-xs">Обновяване на базата...</p>
    </div>

    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="w-80 bg-slate-900 text-slate-400 p-8 shrink-0 flex flex-col shadow-2xl">
            <h1 class="text-white text-2xl font-black mb-10 italic tracking-tighter uppercase leading-none">Mestim <span class="text-blue-500 block text-xs not-italic tracking-[0.3em] mt-1">Operations</span></h1>
            
            <div class="space-y-4 flex-1">
                <button onclick="openModal()" class="w-full bg-blue-600 text-white p-5 rounded-2xl font-bold hover:bg-blue-700 shadow-xl transition-all shadow-blue-900/20 text-sm mb-6">+ НОВА ПОРЪЧКА</button>
                
                <div class="p-5 bg-slate-800/50 rounded-2xl border border-slate-700/50">
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4">Легенда</p>
                    <div class="grid grid-cols-1 gap-2 text-[11px] font-semibold text-slate-300">
                        <div class="flex items-center gap-2"><span class="w-3 h-3 bg-blue-500 rounded-sm"></span> Преместване</div>
                        <div class="flex items-center gap-2"><span class="w-3 h-3 bg-orange-500 rounded-sm"></span> Изхвърляне Стр.</div>
                        <div class="flex items-center gap-2"><span class="w-3 h-3 bg-red-500 rounded-sm"></span> Изхвърляне Мебели</div>
                        <div class="flex items-center gap-2"><span class="w-3 h-3 bg-green-500 rounded-sm"></span> Монтаж / Екип</div>
                    </div>
                </div>
            </div>

            <div class="space-y-3">
                <button onclick="location.href='index.html'" class="w-full p-4 rounded-xl border border-slate-700 text-xs font-bold hover:bg-slate-800 transition uppercase tracking-widest">Администрация</button>
            </div>
        </aside>

        <!-- Main -->
        <main class="flex-1 p-8 overflow-y-auto">
            <div id="calendar"></div>
        </main>
    </div>

    <!-- ORDER MODAL -->
    <div id="orderModal" class="modal">
        <div class="bg-white rounded-[40px] w-full max-w-4xl p-10 shadow-2xl flex gap-10">
            <!-- Form -->
            <form id="orderForm" onsubmit="handleSave(event)" class="flex-1 space-y-4">
                <input type="hidden" name="ID_Order" id="form-id">
                <h3 class="text-3xl font-black text-slate-900 italic tracking-tighter mb-6">Детайли на поръчка</h3>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2">
                        <label class="text-[10px] font-bold text-slate-400 ml-2 uppercase">Клиент</label>
                        <input list="client-list" name="ClientName" id="client-input" oninput="autoFillClient()" placeholder="Име на клиент..." required class="w-full p-4 bg-slate-50 rounded-2xl outline-none border-2 border-transparent focus:border-blue-500 font-bold">
                        <datalist id="client-list"></datalist>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 ml-2 uppercase">Телефон</label>
                        <input type="text" name="Phone" id="client-phone" required class="w-full p-4 bg-slate-50 rounded-2xl outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 ml-2 uppercase">Услуга</label>
                        <select name="Service" id="svc-select" class="w-full p-4 bg-slate-50 rounded-2xl outline-none border-2 border-transparent focus:border-blue-500 font-bold">
                            <option value="Преместване">Преместване</option>
                            <option value="Работа на екип">Работа на екип</option>
                            <option value="Изхвърляне строителни">Изхвърляне строителни</option>
                            <option value="Изхвърляне мебели">Изхвърляне мебели</option>
                            <option value="Транспорт">Транспорт</option>
                            <option value="Оглед">Оглед</option>
                            <option value="Монтаж">Монтаж</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 ml-2 uppercase">Дата</label>
                        <input type="date" name="Date" required id="form-date" class="w-full p-4 bg-slate-50 rounded-2xl outline-none">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 ml-2 uppercase">Начало</label>
                            <input type="time" name="TimeStart" required class="w-full p-4 bg-slate-50 rounded-2xl outline-none">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 ml-2 uppercase">Край</label>
                            <input type="time" name="TimeEnd" required class="w-full p-4 bg-slate-50 rounded-2xl outline-none">
                        </div>
                    </div>
                    <div class="col-span-2">
                        <label class="text-[10px] font-bold text-slate-400 ml-2 uppercase">Адрес</label>
                        <input type="text" name="AddrStart" placeholder="Адрес на обекта" class="w-full p-4 bg-slate-50 rounded-2xl outline-none">
                    </div>
                    <div class="col-span-2">
                        <label class="text-[10px] font-bold text-slate-400 ml-2 uppercase">Описание / Бележки</label>
                        <textarea name="Description" placeholder="Специфични изисквания..." class="w-full p-4 bg-slate-50 rounded-2xl outline-none h-24"></textarea>
                    </div>
                </div>
                
                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="closeModal()" class="flex-1 p-5 bg-slate-100 rounded-2xl font-bold text-slate-400 hover:bg-slate-200">Отказ</button>
                    <button type="submit" class="flex-1 p-5 bg-blue-600 text-white rounded-2xl font-bold uppercase shadow-xl hover:bg-blue-700 transition">Запази</button>
                </div>
                <button type="button" id="del-btn" onclick="deleteOrder()" class="w-full text-red-500 text-[10px] font-black uppercase mt-4 hidden hover:underline tracking-widest text-center">Изтрий поръчката</button>
            </form>

            <!-- Sidebar in Modal -->
            <div class="w-64 border-l border-slate-100 pl-8">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4 italic">Назначи Екип</p>
                <div id="employees-list" class="space-y-2 overflow-y-auto max-h-[500px] pr-2">
                    <!-- Зарежда се динамично -->
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbysYUPyk-rdT3dpCgowWmvqiOOiU1qS3S2qMsKsg1-sLgxbzUtKRwqhAUAg-cLuSSN4yw/exec';
        let calendar;
        let clients = [], employees = [], orders = [];

        document.addEventListener('DOMContentLoaded', function() {
            var calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'timeGridDay',
                locale: 'bg',
                firstDay: 1,
                slotMinTime: '07:00:00',
                slotMaxTime: '21:00:00',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek,timeGridDay'
                },
                buttonText: {
                    today: 'Днес',
                    month: 'Месец',
                    week: 'Седмица',
                    day: 'Ден'
                },
                events: function(fetchInfo, successCallback, failureCallback) {
                    loadData(successCallback);
                },
                eventClick: function(info) {
                    openModal(info.event.extendedProps.originalData);
                }
            });
            calendar.render();
            loadInitialInfo(); // Зарежда клиенти и служители
        });

        async function loadInitialInfo() {
            try {
                const [cRes, eRes] = await Promise.all([
                    fetch(`${API_URL}?action=GET_DATA&tab=Clients`).then(r => r.json()),
                    fetch(`${API_URL}?action=GET_DATA&tab=Employees`).then(r => r.json())
                ]);
                clients = cRes.data || [];
                employees = eRes.data || [];
                
                document.getElementById('client-list').innerHTML = clients.map(c => `<option value="${c.Name}">`).join('');
                document.getElementById('employees-list').innerHTML = employees.map(e => `
                    <label class="flex items-center gap-3 p-3 bg-slate-50 rounded-xl cursor-pointer hover:bg-blue-50 transition border border-transparent hover:border-blue-200">
                        <input type="checkbox" name="emp" value="${e.ID_Emp}" class="w-5 h-5 rounded-lg text-blue-600 focus:ring-0">
                        <span class="text-xs font-bold text-slate-700">${e.Name}</span>
                    </label>
                `).join('');
            } catch (e) { console.error("Error loading info", e); }
        }

        async function loadData(successCallback) {
            toggleLoader(true);
            try {
                const res = await fetch(`${API_URL}?action=GET_DATA&tab=Orders`);
                const result = await res.json();
                orders = result.data || [];

                const svcColors = {
                    'Преместване': '#3b82f6', 'Работа на екип': '#10b981',
                    'Изхвърляне строителни': '#f59e0b', 'Изхвърляне мебели': '#ef4444',
                    'Транспорт': '#8b5cf6', 'Оглед': '#06b6d4', 'Монтаж': '#ec4899'
                };

                const events = orders.map(o => ({
                    id: o.ID_Order,
                    title: `${o.ClientName} - ${o.Service}`,
                    start: `${o.Date.split('T')[0]}T${o.TimeStart}`,
                    end: `${o.Date.split('T')[0]}T${o.TimeEnd}`,
                    backgroundColor: svcColors[o.Service] || '#64748b',
                    extendedProps: { originalData: o }
                }));
                
                if (successCallback) successCallback(events);
            } catch (e) { alert("Грешка при синхронизация!"); }
            finally { toggleLoader(false); }
        }

        function autoFillClient() {
            const name = document.getElementById('client-input').value;
            const client = clients.find(c => c.Name === name);
            if(client) document.getElementById('client-phone').value = client.Phone;
        }

        function openModal(data = null) {
            const form = document.getElementById('orderForm');
            form.reset();
            document.getElementById('del-btn').classList.add('hidden');
            document.querySelectorAll('input[name="emp"]').forEach(cb => cb.checked = false);

            if(data) {
                document.getElementById('modal-title').innerText = "Редакция";
                document.getElementById('form-id').value = data.ID_Order;
                document.getElementById('del-btn').classList.remove('hidden');
                
                // Пълнене на формата
                Object.keys(data).forEach(k => {
                    if(form.elements[k]) {
                        if (k === 'Date' && data[k]) form.elements[k].value = data[k].split('T')[0];
                        else form.elements[k].value = data[k];
                    }
                });

                // Пълнене на екипа
                if(data.Assignments) {
                    const ids = data.Assignments.split(',');
                    document.querySelectorAll('input[name="emp"]').forEach(cb => {
                        if(ids.includes(cb.value)) cb.checked = true;
                    });
                }
            } else {
                document.getElementById('modal-title').innerText = "Нова поръчка";
                document.getElementById('form-id').value = '';
                document.getElementById('form-date').value = new Date().toISOString().split('T')[0];
            }
            document.getElementById('orderModal').classList.add('active');
        }

        async function handleSave(e) {
            e.preventDefault();
            toggleLoader(true);
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            
            // Екип
            const assigned = Array.from(document.querySelectorAll('input[name="emp"]:checked')).map(cb => cb.value);
            data.Assignments = assigned.join(',');

            if(!data.ID_Order) data.ID_Order = 'ORD-' + Math.floor(Math.random()*900000);

            try {
                await fetch(API_URL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify({ action: 'SAVE_DATA', tab: 'Orders', data: data }) 
                });
                
                // Незабавно обновяване
                setTimeout(() => {
                    closeModal();
                    calendar.refetchEvents();
                }, 1000);
            } catch(e) { toggleLoader(false); }
        }

        async function deleteOrder() {
            if(!confirm("Изтриване на поръчката?")) return;
            toggleLoader(true);
            const id = document.getElementById('form-id').value;
            await fetch(`${API_URL}?action=DELETE_DATA&tab=Orders&id=${id}`, { method: 'POST' });
            closeModal();
            calendar.refetchEvents();
        }

        function closeModal() { document.getElementById('orderModal').classList.remove('active'); }
        function toggleLoader(show) { document.getElementById('loader').style.display = show ? 'flex' : 'none'; }
    </script>
</body>
</html>
